<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Clean</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c87a;
      --navy: #1e2d3d; --font: 'DM Sans', sans-serif;
      --bg: #f5f7fa; --surface: #fff; --border: #f0e8d0;
      --muted: #8892a4; --success: #27ae60; --danger: #e74c3c;
      --warning: #f39c12; --radius: 20px;
    }
    body { background: var(--bg); font-family: var(--font); min-height: 100vh; }

    /* LOGIN */
    .login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; background: #fff;
    }
    .auth-box {
      background: #fff; border: 2px solid var(--border);
      border-radius: 28px; padding: 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(201,168,76,0.1);
    }
    .auth-logo-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: #fffbf0; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .auth-logo-wrap img { width: 56px; height: 56px; object-fit: contain; }
    .auth-title { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 0.25rem; }
    .auth-sub { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.75rem; }
    .input-wrap { position: relative; margin-bottom: 0.85rem; }
    .form-input {
      width: 100%; background: var(--bg); border: 2px solid var(--border);
      border-radius: 14px; padding: 1rem 3rem 1rem 1.1rem;
      color: var(--navy); font-family: var(--font); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--muted); }
    .eye-btn {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      color: var(--muted); padding: 0;
    }
    .btn-primary {
      width: 100%; padding: 1.05rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none; border-radius: 14px; color: #fff; font-weight: 700;
      font-family: var(--font); font-size: 1rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(201,168,76,0.3); transition: opacity 0.2s;
      margin-top: 0.25rem;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-msg { margin-top: 0.85rem; font-size: 0.82rem; text-align: center; color: var(--muted); min-height: 1rem; }
    .login-msg.error { color: var(--danger); }
    .back-link { display: block; text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 1.25rem; text-decoration: none; }
    .back-link:hover { color: var(--navy); }

    /* PANEL */
    .panel { display: none; min-height: 100vh; background: var(--bg); }
    .panel-header {
      background: var(--surface); border-bottom: 3px solid var(--gold-light);
      padding: 1.1rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 16px rgba(201,168,76,0.08);
    }
    .panel-header-left { display: flex; align-items: center; gap: 0.85rem; }
    .panel-logo { width: 44px; height: 44px; object-fit: contain; border-radius: 12px; }
    .panel-title { font-size: 1rem; font-weight: 700; color: var(--navy); }
    .panel-sub { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }
    .btn-logout {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 0.5rem 1rem; color: var(--muted);
      font-family: var(--font); font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .content { padding: 1.5rem; max-width: 540px; margin: 0 auto; }
    .section-title {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin: 1.25rem 0 1rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .section-title::after { content:''; flex:1; height:1px; background: #eee; }

    .room-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .room-card::before {
      content:''; position: absolute; top:0; left:0; right:0; height:4px;
      background: var(--status-color, #eee);
    }
    .room-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-color: var(--gold-light); }
    .room-card.dirty { --status-color: #e74c3c; }
    .room-card.cleaning { --status-color: #f39c12; }
    .room-card.free { --status-color: #27ae60; }
    .room-card.occupied { --status-color: #2563eb; }

    .room-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .room-number { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .room-status-badge { font-size: 0.72rem; padding: 0.28rem 0.7rem; border-radius: 8px; font-weight: 700; }
    .badge-free { background: #eafaf1; color: #1e8449; }
    .badge-occupied { background: #eaf0fb; color: #1a5276; }
    .badge-dirty { background: #fdf2f2; color: #922b21; }
    .badge-cleaning { background: #fef9e7; color: #9a7d0a; }
    .room-note { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.75rem; }

    .room-actions { display: flex; gap: 0.75rem; }
    .btn-action {
      flex: 1; padding: 0.8rem; border: none; border-radius: 12px;
      font-family: var(--font); font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-start { background: #fef9e7; color: #9a7d0a; border: 1.5px solid #f0e8d0; }
    .btn-start:hover { background: #fef3cc; }
    .btn-done { background: #eafaf1; color: #1e8449; border: 1.5px solid #d5f5d5; }
    .btn-done:hover { background: #d5f5d5; }

    /* MODAL DETALLE */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border-radius: 28px 28px 0 0;
      padding: 1.75rem; width: 100%; max-width: 540px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle { width: 40px; height: 4px; background: #eee; border-radius: 2px; margin: 0 auto 1.25rem; }
    .modal h3 { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 1.25rem; }

    .checklist { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.25rem; }
    .check-item {
      display: flex; align-items: center; gap: 0.85rem;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0.9rem 1rem; cursor: pointer; transition: all 0.2s;
    }
    .check-item.checked { background: #eafaf1; border-color: #d5f5d5; }
    .check-item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--gold); }
    .check-item label { cursor: pointer; font-size: 0.92rem; color: var(--navy); font-weight: 500; }

    .extras-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.25rem; }
    .extra-btn {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0.9rem 1rem; cursor: pointer; transition: all 0.2s;
    }
    .extra-btn.selected { background: #eafaf1; border-color: #27ae60; }
    .extra-btn-name { font-size: 0.92rem; color: var(--navy); font-weight: 500; }
    .extra-btn-price { font-weight: 700; color: var(--navy); font-size: 0.85rem; }

    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0.9rem 1rem; margin-bottom: 1.25rem;
    }
    .total-label { font-weight: 700; color: var(--navy); }
    .total-amount { font-weight: 700; color: var(--navy); font-size: 1.1rem; }

    .note-input {
      width: 100%; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 0.9rem 1rem; color: var(--navy);
      font-family: var(--font); font-size: 0.92rem; margin-bottom: 1.25rem;
      outline: none; resize: none;
    }
    .note-input:focus { border-color: var(--gold); }

    .modal-btns { display: flex; gap: 0.75rem; }
    .btn-cancel {
      flex: 1; padding: 0.9rem; background: var(--bg); border: 1.5px solid #eee;
      border-radius: 12px; color: var(--muted); font-family: var(--font);
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .btn-save {
      flex: 1; padding: 0.9rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none; border-radius: 12px; color: #fff; font-weight: 700;
      font-family: var(--font); font-size: 0.9rem; cursor: pointer;
      box-shadow: 0 4px 12px rgba(201,168,76,0.3);
    }

    .empty-state { text-align: center; color: var(--muted); padding: 3rem; font-size: 0.95rem; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-page">
    <div class="auth-box">
      <div class="auth-logo-wrap">
        <img src="../images/clean.png" alt="Clean"/>
      </div>
      <div class="auth-title">Panel Clean</div>
      <div class="auth-sub">Gestión de limpieza</div>
      <div class="input-wrap">
        <input type="email" class="form-input" id="clean-email" placeholder="Email"/>
      </div>
      <div class="input-wrap">
        <input type="password" class="form-input" id="clean-password" placeholder="Contraseña"/>
        <button class="eye-btn" type="button" onclick="toggleEye('clean-password', this)">👁️</button>
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
      <p class="login-msg" id="login-msg"></p>
      <a href="../" class="back-link">← Volver al inicio</a>
    </div>
  </div>

  <!-- PANEL CLEAN -->
  <div id="panel-screen" class="panel">
    <div class="panel-header">
      <div class="panel-header-left">
        <img src="../images/clean.png" alt="Clean" class="panel-logo"/>
        <div>
          <div class="panel-title">Panel Limpieza</div>
          <div class="panel-sub" id="panel-hotel-name">Cargando...</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>

    <div class="content">
      <p class="section-title">Habitaciones</p>
      <div id="rooms-list">
        <p class="empty-state">Cargando...</p>
      </div>
    </div>
  </div>

  <!-- MODAL DETALLE -->
  <div class="modal-overlay hidden" id="modal-room">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 id="modal-title">Habitación</h3>

      <p class="section-title">Checklist limpieza</p>
      <div class="checklist">
        <div class="check-item" onclick="toggleCheck(this, 'sabanas')">
          <input type="checkbox" id="chk-sabanas"/>
          <label for="chk-sabanas">🛏️ Sábanas</label>
        </div>
        <div class="check-item" onclick="toggleCheck(this, 'toallas')">
          <input type="checkbox" id="chk-toallas"/>
          <label for="chk-toallas">🛁 Toallas</label>
        </div>
        <div class="check-item" onclick="toggleCheck(this, 'amenities')">
          <input type="checkbox" id="chk-amenities"/>
          <label for="chk-amenities">🧴 Amenities</label>
        </div>
        <div class="check-item" onclick="toggleCheck(this, 'piso')">
          <input type="checkbox" id="chk-piso"/>
          <label for="chk-piso">🧹 Piso</label>
        </div>
        <div class="check-item" onclick="toggleCheck(this, 'bano')">
          <input type="checkbox" id="chk-bano"/>
          <label for="chk-bano">🚿 Baño</label>
        </div>
      </div>

      <p class="section-title">Extras utilizados</p>
      <div class="extras-list" id="extras-list"></div>

      <div class="total-row">
        <span class="total-label">Total extras</span>
        <span class="total-amount" id="total-amount">$0</span>
      </div>

      <p class="section-title">Nota</p>
      <textarea class="note-input" id="room-note" rows="2" placeholder="Ej: falta jabón, cortina rota..."></textarea>

      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveClean()">Guardar ✓</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, collection, onSnapshot, updateDoc, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let hotelId = null;
    let currentRoomId = null;
    let currentRoomStatus = null;
    let extras = [];
    let selectedExtras = {};

    const statusLabel = { dirty:'Sucia', cleaning:'Limpiando', free:'Libre', occupied:'Ocupada' };
    const statusBadge = { dirty:'badge-dirty', cleaning:'badge-cleaning', free:'badge-free', occupied:'badge-occupied' };
    const statusClass = { dirty:'dirty', cleaning:'cleaning', free:'free', occupied:'occupied' };
    const sortOrder = { dirty:0, cleaning:1, occupied:2, free:3 };

    window.toggleEye = (id, btn) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        hotelId = userDoc.exists() ? userDoc.data().hotelId : user.uid;
        const hotelDoc = await getDoc(doc(db, 'hotels', hotelId));
        if (hotelDoc.exists()) {
          document.getElementById('panel-hotel-name').textContent = hotelDoc.data().name;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('panel-screen').style.display = 'block';
        await loadExtras();
        loadRooms();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('panel-screen').style.display = 'none';
      }
    });

    async function loadExtras() {
      const snap = await getDocs(collection(db, 'hotels', hotelId, 'extras'));
      extras = [];
      snap.forEach(d => extras.push({ id: d.id, ...d.data() }));
    }

    function loadRooms() {
      onSnapshot(collection(db, 'hotels', hotelId, 'rooms'), (snap) => {
        const list = document.getElementById('rooms-list');
        list.innerHTML = '';
        const rooms = [];
        snap.forEach(d => rooms.push({ id: d.id, ...d.data() }));
        if (rooms.length === 0) { list.innerHTML = '<p class="empty-state">No hay habitaciones</p>'; return; }
        rooms.sort((a,b) => sortOrder[a.status] - sortOrder[b.status]);
        rooms.forEach(r => {
          const card = document.createElement('div');
          card.className = `room-card ${statusClass[r.status]}`;
          card.innerHTML = `
            <div class="room-card-header">
              <span class="room-number">🚪 ${r.number}</span>
              <span class="room-status-badge ${statusBadge[r.status]}">${statusLabel[r.status]}</span>
            </div>
            ${r.note ? `<p class="room-note">📝 ${r.note}</p>` : ''}
            <div class="room-actions">
              ${r.status === 'dirty' ? `<button class="btn-action btn-start" onclick="event.stopPropagation();startCleaning('${r.id}')">▶ Empezar limpieza</button>` : ''}
              ${r.status === 'cleaning' ? `<button class="btn-action btn-done" onclick="event.stopPropagation();openModal('${r.id}','${r.number}','${r.status}','${r.note||''}')">✓ Terminé</button>` : ''}
              ${r.status === 'free' || r.status === 'occupied' ? `<button class="btn-action btn-start" onclick="event.stopPropagation();openModal('${r.id}','${r.number}','${r.status}','${r.note||''}')">📋 Detalle</button>` : ''}
            </div>
          `;
          card.onclick = () => openModal(r.id, r.number, r.status, r.note||'');
          list.appendChild(card);
        });
      });
    }

    window.startCleaning = async (id) => {
      await updateDoc(doc(db, 'hotels', hotelId, 'rooms', id), { status: 'cleaning' });
    };

    window.openModal = (id, number, status, note) => {
      currentRoomId = id;
      currentRoomStatus = status;
      selectedExtras = {};
      document.getElementById('modal-title').textContent = `🚪 Habitación ${number}`;
      document.getElementById('room-note').value = note;
      ['sabanas','toallas','amenities','piso','bano'].forEach(k => {
        const el = document.getElementById('chk-' + k);
        el.checked = false;
        el.closest('.check-item').classList.remove('checked');
      });
      const extList = document.getElementById('extras-list');
      extList.innerHTML = '';
      if (extras.length === 0) {
        extList.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">Sin extras configurados</p>';
      } else {
        extras.forEach(e => {
          const btn = document.createElement('div');
          btn.className = 'extra-btn';
          btn.id = 'ext-' + e.id;
          btn.innerHTML = `<span class="extra-btn-name">${e.name}</span><span class="extra-btn-price">${e.price > 0 ? '$'+e.price : 'Sin cargo'}</span>`;
          btn.onclick = () => toggleExtra(e, btn);
          extList.appendChild(btn);
        });
      }
      updateTotal();
      document.getElementById('modal-room').classList.remove('hidden');
    };

    window.toggleCheck = (el, key) => {
      const chk = document.getElementById('chk-' + key);
      chk.checked = !chk.checked;
      el.classList.toggle('checked', chk.checked);
    };

    function toggleExtra(e, btn) {
      if (selectedExtras[e.id]) {
        delete selectedExtras[e.id];
        btn.classList.remove('selected');
      } else {
        selectedExtras[e.id] = e;
        btn.classList.add('selected');
      }
      updateTotal();
    }

    function updateTotal() {
      const total = Object.values(selectedExtras).reduce((s,e) => s + (e.price||0), 0);
      document.getElementById('total-amount').textContent = '$' + total;
    }

    window.saveClean = async () => {
      const note = document.getElementById('room-note').value.trim();
      const checklist = {
        sabanas: document.getElementById('chk-sabanas').checked,
        toallas: document.getElementById('chk-toallas').checked,
        amenities: document.getElementById('chk-amenities').checked,
        piso: document.getElementById('chk-piso').checked,
        bano: document.getElementById('chk-bano').checked,
      };
      const extrasUsed = Object.values(selectedExtras);
      const total = extrasUsed.reduce((s,e) => s + (e.price||0), 0);
      await addDoc(collection(db, 'hotels', hotelId, 'cleanings'), {
        roomId: currentRoomId, checklist, extras: extrasUsed, total, note, date: new Date()
      });
      const newStatus = (currentRoomStatus==='dirty'||currentRoomStatus==='cleaning') ? 'free' : currentRoomStatus;
      await updateDoc(doc(db, 'hotels', hotelId, 'rooms', currentRoomId), { status: newStatus, note: note||'' });
      closeModal();
    };

    window.closeModal = () => document.getElementById('modal-room').classList.add('hidden');

    window.doLogin = async () => {
      const email = document.getElementById('clean-email').value.trim();
      const password = document.getElementById('clean-password').value;
      const msg = document.getElementById('login-msg');
      const btn = document.getElementById('btn-login');
      if (!email || !password) { msg.className='login-msg error'; msg.textContent='Completá email y contraseña'; return; }
      btn.disabled = true;
      msg.className = 'login-msg'; msg.textContent = 'Ingresando...';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch(e) {
        msg.className = 'login-msg error'; msg.textContent = 'Email o contraseña incorrectos';
        btn.disabled = false;
      }
    };

    window.doLogout = async () => { await signOut(auth); };
  </script>
</body>
</html>
