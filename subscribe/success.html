<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — ¡Suscripción activa!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .page { max-width: 480px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    .title { font-size: 1.8rem; font-weight: 700; color: #2a3542; margin-bottom: 0.75rem; }
    .subtitle { color: #888; font-size: 1rem; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      display: block; background: #2a3542; color: #fff; font-weight: 700;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 1rem;
      border-radius: 14px; text-decoration: none; margin-bottom: 1rem;
    }
    .btn-secondary {
      display: block; background: #f8f9fa; color: #2a3542; font-weight: 600;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; padding: 0.85rem;
      border-radius: 14px; text-decoration: none; border: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="icon">🎉</div>
    <h1 class="title">¡Bienvenido a NeoFlux!</h1>
    <p class="subtitle">Tu suscripción está activa.<br>Tenés 14 días de prueba gratuita.<br>Empezá a gestionar tu hotel ahora mismo.</p>
    <a href="../host/" class="btn">Ir al Panel Host</a>
    <a href="../" class="btn-secondary">Volver al inicio</a>
  </div>
</body>
</html>
