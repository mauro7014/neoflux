<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .auth-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      margin: auto;
    }
    .auth-logo {
      width: 100px;
      display: block;
      margin: 0 auto 1.5rem;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }
    .auth-tabs button {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: #666;
      font-family: var(--font);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tabs button.active {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .form-group input {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-family: var(--font);
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2rem;
    }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--success); }
    .page-center {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="page-center">
    <div class="auth-box">
      <img src="../images/neoflux.png" alt="NeoFlux" class="auth-logo"/>
      <div class="auth-tabs">
        <button class="active" onclick="showTab('login')">Ingresar</button>
        <button onclick="showTab('register')">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <div id="tab-login">
        <div class="form-group">
          <input type="email" id="login-email" placeholder="Email"/>
          <input type="password" id="login-password" placeholder="Contraseña"/>
        </div>
        <button class="btn-primary" onclick="doLogin()">Ingresar</button>
        <p class="msg" id="login-msg"></p>
      </div>

      <!-- REGISTRO -->
      <div id="tab-register" style="display:none">
        <div class="form-group">
          <input type="text" id="reg-hotel" placeholder="Nombre del hotel"/>
          <input type="email" id="reg-email" placeholder="Email"/>
          <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)"/>
        </div>
        <button class="btn-primary" onclick="doRegister()">Crear cuenta</button>
        <p class="msg" id="register-msg"></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
      doc, setDoc, getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Si ya está logueado, ir al dashboard
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });

    window.showTab = (tab) => {
      document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.auth-tabs button').forEach((b, i) => {
        b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
    };

    window.doLogin = async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = 'Email o contraseña incorrectos';
      }
    };

    window.doRegister = async () => {
      const hotel = document.getElementById('reg-hotel').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const msg = document.getElementById('register-msg');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'hotels', cred.user.uid), {
          name: hotel,
          email: email,
          createdAt: new Date(),
          plan: 'trial',
          trialEnds: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000)
        });
        window.location.href = 'dashboard.html';
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = e.message;
      }
    };
  </script>
</body>
</html>
