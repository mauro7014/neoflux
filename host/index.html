<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c87a;
      --navy: #1e2d3d; --font: 'DM Sans', sans-serif;
      --bg: #f5f7fa; --surface: #fff; --border: #f0e8d0;
      --muted: #8892a4; --success: #27ae60; --danger: #e74c3c;
    }
    body { background: #fff; font-family: var(--font); min-height: 100vh; }

    .login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; background: #fff;
    }
    .auth-box {
      background: #fff; border: 2px solid var(--border);
      border-radius: 28px; padding: 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(201,168,76,0.1);
    }
    .auth-logo-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: #fffbf0; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .auth-logo-wrap img { width: 56px; height: 56px; object-fit: contain; }
    .auth-title { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 0.25rem; }
    .auth-sub { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.75rem; }

    .auth-tabs {
      display: flex; background: var(--bg); border-radius: 14px;
      padding: 0.3rem; margin-bottom: 1.5rem; gap: 0.3rem;
    }
    .auth-tab {
      flex: 1; padding: 0.7rem; border: none; background: transparent;
      color: var(--muted); font-family: var(--font); font-size: 0.9rem;
      font-weight: 600; cursor: pointer; border-radius: 10px; transition: all 0.2s;
    }
    .auth-tab.active {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: #fff; box-shadow: 0 2px 8px rgba(201,168,76,0.3);
    }

    .input-wrap { position: relative; margin-bottom: 0.85rem; }
    .form-input {
      width: 100%; background: var(--bg); border: 2px solid var(--border);
      border-radius: 14px; padding: 1rem 3rem 1rem 1.1rem;
      color: var(--navy); font-family: var(--font); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--muted); }
    .eye-btn {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      color: var(--muted); padding: 0;
    }

    .btn-primary {
      width: 100%; padding: 1.05rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none; border-radius: 14px; color: #fff; font-weight: 700;
      font-family: var(--font); font-size: 1rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(201,168,76,0.3); transition: opacity 0.2s;
      margin-top: 0.25rem;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg { margin-top: 0.85rem; font-size: 0.82rem; text-align: center; min-height: 1rem; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--success); }

    .back-link {
      display: block; text-align: center; color: var(--muted);
      font-size: 0.8rem; margin-top: 1.25rem; text-decoration: none;
    }
    .back-link:hover { color: var(--navy); }

    #loading-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: var(--muted); font-size: 0.9rem; background: #fff;
    }
  </style>
</head>
<body>

  <div id="loading-screen">Verificando sesión...</div>

  <div id="auth-screen" class="login-page" style="display:none">
    <div class="auth-box">
      <div class="auth-logo-wrap">
        <img src="../images/neoflux.png" alt="NeoFlux"/>
      </div>
      <div class="auth-title">Bienvenido</div>
      <div class="auth-sub">Panel de gestión hotelera</div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Ingresar</button>
        <button class="auth-tab" onclick="showTab('register')">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <div id="tab-login">
        <div class="input-wrap">
          <input type="email" class="form-input" id="login-email" placeholder="Email"/>
        </div>
        <div class="input-wrap">
          <input type="password" class="form-input" id="login-password" placeholder="Contraseña"/>
          <button class="eye-btn" type="button" onclick="toggleEye('login-password', this)">👁️</button>
        </div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
        <p class="msg" id="login-msg"></p>
      </div>

      <!-- REGISTRO -->
      <div id="tab-register" style="display:none">
        <div class="input-wrap">
          <input type="text" class="form-input" id="reg-hotel" placeholder="Nombre del hotel"/>
        </div>
        <div class="input-wrap">
          <input type="email" class="form-input" id="reg-email" placeholder="Email"/>
        </div>
        <div class="input-wrap">
          <input type="password" class="form-input" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)"/>
          <button class="eye-btn" type="button" onclick="toggleEye('reg-password', this)">👁️</button>
        </div>
        <button class="btn-primary" id="btn-register" onclick="doRegister()">Crear cuenta</button>
        <p class="msg" id="register-msg"></p>
      </div>

      <a href="../" class="back-link">← Volver al inicio</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace('dashboard.html');
      } else {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
      }
    });

    window.toggleEye = (id, btn) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    };

    window.showTab = (tab) => {
      document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.auth-tab').forEach((b,i) => {
        b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
      });
    };

    window.doLogin = async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      const btn = document.getElementById('btn-login');
      if (!email || !password) {
        msg.className = 'msg error'; msg.textContent = 'Completá email y contraseña'; return;
      }
      btn.disabled = true;
      msg.className = 'msg'; msg.textContent = 'Ingresando...';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch(e) {
        msg.className = 'msg error'; msg.textContent = 'Email o contraseña incorrectos';
        btn.disabled = false;
      }
    };

    window.doRegister = async () => {
      const hotel = document.getElementById('reg-hotel').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const msg = document.getElementById('register-msg');
      const btn = document.getElementById('btn-register');
      if (!hotel || !email || !password) {
        msg.className = 'msg error'; msg.textContent = 'Completá todos los campos'; return;
      }
      btn.disabled = true;
      msg.className = 'msg'; msg.textContent = 'Creando cuenta...';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'hotels', cred.user.uid), {
          name: hotel, email, createdAt: new Date(), plan: 'trial',
          trialEnds: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000)
        });
      } catch(e) {
        msg.className = 'msg error'; msg.textContent = e.message;
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
