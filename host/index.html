<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #e8c87a; --font: 'DM Sans', sans-serif; }
    body { background: #ffffff; font-family: var(--font); min-height: 100vh; }
    .page-center {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .auth-box {
      background: #000000;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .auth-logo {
      width: 100px;
      display: block;
      margin: 0 auto 1.5rem;
    }
    .auth-tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #222;
    }
    .auth-tabs button {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: #aaa;
      font-family: var(--font);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .auth-tabs button.active {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .form-group input {
      background: #111 !important;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: #ffffff !important;
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      -webkit-text-fill-color: #ffffff !important;
      -webkit-box-shadow: 0 0 0px 1000px #111 inset !important;
    }
    .form-group input::placeholder { color: #555; }
    .form-group input:focus { border-color: var(--accent); }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      width: 100%;
      padding-right: 3rem;
    }
    .eye-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #555;
      padding: 0;
    }
    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-family: var(--font);
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .msg { margin-top: 1rem; font-size: 0.85rem; text-align: center; min-height: 1.2rem; }
    .msg.error { color: #e05252; }
    .msg.success { color: #52c07a; }
  </style>
</head>
<body>
  <div class="page-center">
    <div class="auth-box">
      <img src="../images/neoflux.png" alt="NeoFlux" class="auth-logo"/>
      <div class="auth-tabs">
        <button class="active" onclick="showTab('login')">Ingresar</button>
        <button onclick="showTab('register')">Registrarse</button>
      </div>

      <div id="tab-login">
        <div class="form-group">
          <input type="email" id="login-email" placeholder="Email" autocomplete="email"/>
          <div class="password-wrap">
            <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password"/>
            <button class="eye-btn" onclick="togglePassword('login-password', this)" type="button">👁️</button>
          </div>
        </div>
        <button class="btn-primary" onclick="doLogin()">Ingresar</button>
        <p class="msg" id="login-msg"></p>
      </div>

      <div id="tab-register" style="display:none">
        <div class="form-group">
          <input type="text" id="reg-hotel" placeholder="Nombre del hotel"/>
          <input type="email" id="reg-email" placeholder="Email" autocomplete="email"/>
          <div class="password-wrap">
            <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password"/>
            <button class="eye-btn" onclick="togglePassword('reg-password', this)" type="button">👁️</button>
          </div>
        </div>
        <button class="btn-primary" onclick="doRegister()">Crear cuenta</button>
        <p class="msg" id="register-msg"></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    window.togglePassword = (id, btn) => {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    };

    window.showTab = (tab) => {
      document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.auth-tabs button').forEach((b, i) => {
        b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
    };

    window.doLogin = async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      msg.textContent = 'Ingresando...';
      msg.className = 'msg';
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = 'Email o contraseña incorrectos';
      }
    };

    window.doRegister = async () => {
      const hotel = document.getElementById('reg-hotel').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const msg = document.getElementById('register-msg');
      msg.textContent = 'Creando cuenta...';
      msg.className = 'msg';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'hotels', cred.user.uid), {
          name: hotel,
          email: email,
          createdAt: new Date(),
          plan: 'trial',
          trialEnds: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000)
        });
        window.location.href = 'dashboard.html';
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = e.message;
      }
    };
  </script>
</body>
</html>
