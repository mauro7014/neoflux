<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Panel Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --border: #f0e8d0;
      --gold: #c9a84c;
      --gold-light: #e8c87a;
      --navy: #1e2d3d;
      --text: #1a1a2e;
      --muted: #8892a4;
      --success: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --blue: #2563eb;
      --font: 'DM Sans', sans-serif;
      --radius: 20px;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 3px solid var(--gold-light);
      padding: 1.1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 16px rgba(201,168,76,0.1);
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 12px; }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .header-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }
    .header-right { display: flex; align-items: center; gap: 0.6rem; }
    .trial-badge {
      background: linear-gradient(135deg, #fff8e8, #fef3cc);
      border: 1px solid var(--gold-light); border-radius: 10px;
      padding: 0.35rem 0.75rem; font-size: 0.72rem; font-weight: 700; color: var(--gold);
    }
    .btn-logout {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 0.5rem 1rem; color: var(--muted);
      font-family: var(--font); font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* NAV TABS */
    .nav-tabs {
      display: flex; background: var(--surface);
      border-bottom: 1px solid #eee;
      overflow-x: auto; scrollbar-width: none;
      padding: 0 1rem;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab {
      flex: 1; min-width: 90px; padding: 1rem 0.5rem;
      border: none; background: transparent;
      color: var(--muted); font-family: var(--font);
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-tab.active { color: var(--navy); border-bottom-color: var(--gold); }
    .nav-tab:hover { color: var(--navy); }

    /* CONTENT */
    .content { padding: 1.5rem; max-width: 540px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 1rem 0.5rem; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-number { font-size: 1.8rem; font-weight: 700; color: var(--navy); }
    .stat-label { font-size: 0.6rem; color: var(--muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }

    /* SECTION TITLE */
    .section-title {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin: 1.5rem 0 1rem;
      display: flex; align-items: center; gap: 0.6rem; font-weight: 600;
    }
    .section-title::after { content:''; flex:1; height:1px; background: #eee; }

    /* ROOMS */
    .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .room-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; cursor: pointer;
      transition: all 0.2s; position: relative; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .room-card::before {
      content:''; position: absolute; top:0; left:0; right:0; height:4px;
      background: var(--status-color, #eee); border-radius: 20px 20px 0 0;
    }
    .room-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: var(--gold-light); }
    .room-card.free { --status-color: #27ae60; }
    .room-card.occupied { --status-color: #2563eb; }
    .room-card.dirty { --status-color: #e74c3c; }
    .room-card.cleaning { --status-color: #f39c12; }
    .room-number { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .room-status-badge {
      font-size: 0.72rem; padding: 0.25rem 0.65rem; border-radius: 8px;
      display: inline-block; font-weight: 700;
    }
    .badge-free { background: #eafaf1; color: #1e8449; }
    .badge-occupied { background: #eaf0fb; color: #1a5276; }
    .badge-dirty { background: #fdf2f2; color: #922b21; }
    .badge-cleaning { background: #fef9e7; color: #9a7d0a; }
    .room-staff-tag { font-size: 0.68rem; color: var(--muted); margin-top: 0.5rem; }

    /* BTN ADD */
    .btn-add {
      width: 100%; padding: 1rem; background: transparent;
      border: 2px dashed var(--gold-light); border-radius: var(--radius);
      color: var(--gold); font-family: var(--font); font-size: 0.95rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 0.75rem;
    }
    .btn-add:hover { background: #fffbf0; border-style: solid; }

    /* ORDER CARDS */
    .order-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .order-room-label { font-weight: 700; font-size: 1rem; color: var(--navy); }
    .order-badge { font-size: 0.72rem; padding: 0.3rem 0.75rem; border-radius: 8px; font-weight: 700; }
    .badge-pending { background: #fdf2f2; color: #922b21; }
    .badge-progress { background: #fef9e7; color: #9a7d0a; }
    .badge-done { background: #eafaf1; color: #1e8449; }

    /* LIST ITEMS */
    .list-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .list-item-name { font-weight: 600; font-size: 0.95rem; color: var(--text); }
    .list-item-value { font-weight: 700; color: var(--navy); }
    .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.1rem; padding: 0.2rem; }
    .staff-role-tag {
      font-size: 0.72rem; color: var(--blue); font-weight: 700;
      background: #eaf0fb; padding: 0.3rem 0.65rem; border-radius: 8px;
    }

    /* MODALS */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; z-index: 100; overflow-y: auto;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 24px; padding: 1.75rem; width: 100%; max-width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12); margin: auto;
    }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; color: var(--navy); }
    .modal input, .modal select {
      width: 100%; background: var(--bg); border: 1.5px solid #e8e8e8;
      border-radius: 12px; padding: 0.9rem 1.1rem; color: var(--text);
      font-family: var(--font); font-size: 0.95rem; margin-bottom: 0.85rem;
      outline: none; transition: border-color 0.2s;
    }
    .modal input:focus, .modal select:focus { border-color: var(--gold); }
    .modal-btns { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .btn-cancel {
      flex: 1; padding: 0.9rem; background: var(--bg); border: 1.5px solid #e8e8e8;
      border-radius: 12px; color: var(--muted); font-family: var(--font);
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--muted); }
    .btn-save {
      flex: 1; padding: 0.9rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none; border-radius: 12px; color: #fff; font-weight: 700;
      font-family: var(--font); font-size: 0.9rem; cursor: pointer;
      box-shadow: 0 4px 12px rgba(201,168,76,0.3); transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-danger-modal {
      flex: 1; padding: 0.9rem; background: #fdf2f2; border: none;
      border-radius: 12px; color: var(--danger); font-weight: 700;
      font-family: var(--font); font-size: 0.9rem; cursor: pointer;
    }
    .btn-print {
      flex: 1; padding: 0.9rem; background: #eaf0fb; border: none;
      border-radius: 12px; color: var(--blue); font-weight: 700;
      font-family: var(--font); font-size: 0.9rem; cursor: pointer;
    }
    .msg { margin-top: 0.85rem; font-size: 0.82rem; text-align: center; min-height: 1rem; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--success); }

    /* QR */
    .qr-print-area {
      background: #fff; border: 1.5px solid #eee; border-radius: 18px;
      padding: 1.75rem; margin: 1rem 0; text-align: center;
    }
    .qr-hotel-name { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.3rem; }
    .qr-room-name { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; }
    .qr-hint { font-size: 0.75rem; color: var(--muted); margin-top: 1.25rem; }
    .qr-url-text { font-size: 0.55rem; color: #bbb; margin-top: 0.4rem; word-break: break-all; }
    #qr-container { display: flex; justify-content: center; }

    .empty-state { text-align: center; color: var(--muted); padding: 2.5rem; font-size: 0.95rem; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="../images/host.png" alt="Host" class="header-logo"/>
      <div>
        <div class="header-title">Panel Host</div>
        <div class="header-sub" id="hotel-name">Cargando...</div>
      </div>
    </div>
    <div class="header-right">
      <span class="trial-badge hidden" id="trial-badge"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('rooms',this)">🚪 Habitaciones</button>
    <button class="nav-tab" onclick="showTab('orders',this)">🛎️ Pedidos</button>
    <button class="nav-tab" onclick="showTab('extras',this)">💰 Extras</button>
    <button class="nav-tab" onclick="showTab('staff',this)">👥 Personal</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div id="tab-rooms" class="tab-content active">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="stat-free">0</div><div class="stat-label">Libres</div></div>
        <div class="stat-card"><div class="stat-number" id="stat-occupied">0</div><div class="stat-label">Ocupadas</div></div>
        <div class="stat-card"><div class="stat-number" id="stat-dirty">0</div><div class="stat-label">Sucias</div></div>
        <div class="stat-card"><div class="stat-number" id="stat-cleaning">0</div><div class="stat-label">Limpiando</div></div>
      </div>
      <p class="section-title">Habitaciones</p>
      <div class="rooms-grid" id="rooms-grid"></div>
      <button class="btn-add" onclick="openAddRoom()">+ Agregar habitación</button>
    </div>

    <div id="tab-orders" class="tab-content">
      <p class="section-title">Pedidos activos</p>
      <div id="orders-list"><p class="empty-state">Cargando...</p></div>
    </div>

    <div id="tab-extras" class="tab-content">
      <p class="section-title">Extras configurados</p>
      <div id="extras-list"></div>
      <button class="btn-add" onclick="openAddExtra()">+ Agregar extra</button>
    </div>

    <div id="tab-staff" class="tab-content">
      <p class="section-title">Personal registrado</p>
      <div id="staff-list"></div>
      <button class="btn-add" onclick="openAddStaff()">+ Registrar personal</button>
    </div>

  </div>

  <!-- Modal nueva habitación -->
  <div class="modal-overlay hidden" id="modal-add">
    <div class="modal">
      <h3>🚪 Nueva habitación</h3>
      <input type="text" id="room-number" placeholder="Número o nombre (ej: 101)"/>
      <select id="room-status">
        <option value="free">Libre</option>
        <option value="occupied">Ocupada</option>
        <option value="dirty">Sucia</option>
        <option value="cleaning">Limpiando</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addRoom()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal editar habitación -->
  <div class="modal-overlay hidden" id="modal-edit">
    <div class="modal">
      <h3 id="edit-room-title">Habitación</h3>
      <input type="text" id="edit-room-number" placeholder="Número o nombre"/>
      <select id="edit-room-status">
        <option value="free">Libre</option>
        <option value="occupied">Ocupada</option>
        <option value="dirty">Sucia</option>
        <option value="cleaning">Limpiando</option>
      </select>
      <select id="edit-room-staff">
        <option value="">Sin asignar</option>
      </select>
      <div class="modal-btns">
        <button class="btn-print" onclick="showQR()">📱 Ver QR</button>
        <button class="btn-save" onclick="saveRoom()">Guardar</button>
      </div>
      <div class="modal-btns" style="margin-top:0.6rem">
        <button class="btn-danger-modal" onclick="deleteRoom()">🗑️ Eliminar</button>
        <button class="btn-cancel" onclick="closeModal()">Volver</button>
      </div>
    </div>
  </div>

  <!-- Modal QR -->
  <div class="modal-overlay hidden" id="modal-qr">
    <div class="modal" style="text-align:center">
      <h3 id="qr-title">QR Habitación</h3>
      <div class="qr-print-area" id="qr-print-area">
        <div class="qr-hotel-name" id="qr-hotel-print"></div>
        <div class="qr-room-name" id="qr-room-print"></div>
        <div id="qr-container"></div>
        <div class="qr-hint">📱 Escaneá para hacer Check-In</div>
        <div class="qr-url-text" id="qr-url"></div>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="backToEdit()">← Volver</button>
        <button class="btn-print" onclick="printQR()">🖨️ Imprimir</button>
      </div>
      <div style="margin-top:0.6rem">
        <button class="btn-cancel" style="width:100%" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Modal extra -->
  <div class="modal-overlay hidden" id="modal-extra">
    <div class="modal">
      <h3>💰 Nuevo extra</h3>
      <input type="text" id="extra-name" placeholder="Nombre (ej: Toalla extra)"/>
      <input type="number" id="extra-price" placeholder="Precio (0 = sin cargo)"/>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addExtra()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal personal -->
  <div class="modal-overlay hidden" id="modal-staff">
    <div class="modal">
      <h3>👥 Registrar personal</h3>
      <input type="text" id="staff-name" placeholder="Nombre"/>
      <input type="email" id="staff-email" placeholder="Email"/>
      <input type="password" id="staff-password" placeholder="Contraseña (mín. 6 caracteres)"/>
      <select id="staff-role">
        <option value="cleaner">🧹 Mucama (solo Clean)</option>
        <option value="staff">👤 Staff (Host reducido)</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addStaff()">Registrar</button>
      </div>
      <p class="msg" id="staff-msg"></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let hotelId = null;
    let hotelNameText = '';
    let editingRoomId = null;
    let editingRoomNumber = '';
    let staffList = [];

    const statusClass = { free:'free', occupied:'occupied', dirty:'dirty', cleaning:'cleaning' };
    const statusBadge = { free:'badge-free', occupied:'badge-occupied', dirty:'badge-dirty', cleaning:'badge-cleaning' };
    const statusLabel = { free:'Libre', occupied:'Ocupada', dirty:'Sucia', cleaning:'Limpiando' };
    const orderBadge = { pending:'badge-pending', progress:'badge-progress', done:'badge-done' };
    const orderLabel = { pending:'Pendiente', progress:'En curso', done:'Completado' };

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      hotelId = user.uid;
      const hotelDoc = await getDoc(doc(db, 'hotels', hotelId));
      if (hotelDoc.exists()) {
        const data = hotelDoc.data();
        hotelNameText = data.name;
        document.getElementById('hotel-name').textContent = data.name;
        if (data.trialEnds) {
          const end = data.trialEnds?.toDate?.();
          if (end) {
            const days = Math.ceil((end - new Date()) / 86400000);
            const badge = document.getElementById('trial-badge');
            badge.textContent = days > 0 ? `⏱ ${days}d prueba` : '⚠️ Prueba expirada';
            badge.classList.remove('hidden');
          }
        }
      }
      loadRooms();
      loadExtras();
      loadStaff();
      loadOrders();
    });

    window.showTab = (tab, btn) => {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
    };

    // HABITACIONES
    function loadRooms() {
      onSnapshot(collection(db, 'hotels', hotelId, 'rooms'), (snap) => {
        const grid = document.getElementById('rooms-grid');
        grid.innerHTML = '';
        let counts = { free:0, occupied:0, dirty:0, cleaning:0 };
        snap.forEach(d => {
          const r = d.data();
          counts[r.status] = (counts[r.status] || 0) + 1;
          const card = document.createElement('div');
          card.className = `room-card ${statusClass[r.status]}`;
          card.innerHTML = `
            <div class="room-number">🚪 ${r.number}</div>
            <span class="room-status-badge ${statusBadge[r.status]}">${statusLabel[r.status]}</span>
            ${r.assignedStaff ? `<div class="room-staff-tag">👤 ${r.assignedStaff}</div>` : ''}
          `;
          card.onclick = () => openEditRoom(d.id, r.number, r.status, r.assignedStaffId);
          grid.appendChild(card);
        });
        document.getElementById('stat-free').textContent = counts.free;
        document.getElementById('stat-occupied').textContent = counts.occupied;
        document.getElementById('stat-dirty').textContent = counts.dirty;
        document.getElementById('stat-cleaning').textContent = counts.cleaning;
      });
    }

    window.openAddRoom = () => document.getElementById('modal-add').classList.remove('hidden');
    window.addRoom = async () => {
      const number = document.getElementById('room-number').value.trim();
      const status = document.getElementById('room-status').value;
      if (!number) return;
      await addDoc(collection(db, 'hotels', hotelId, 'rooms'), { number, status });
      closeModal();
      document.getElementById('room-number').value = '';
    };
    window.openEditRoom = (id, number, status, assignedStaffId) => {
      editingRoomId = id;
      editingRoomNumber = number;
      document.getElementById('edit-room-title').textContent = `🚪 Habitación ${number}`;
      document.getElementById('edit-room-number').value = number;
      document.getElementById('edit-room-status').value = status;
      const sel = document.getElementById('edit-room-staff');
      sel.innerHTML = '<option value="">Sin asignar</option>';
      staffList.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.uid;
        opt.textContent = s.name;
        if (s.uid === assignedStaffId) opt.selected = true;
        sel.appendChild(opt);
      });
      document.getElementById('modal-edit').classList.remove('hidden');
    };
    window.saveRoom = async () => {
      const number = document.getElementById('edit-room-number').value.trim();
      const status = document.getElementById('edit-room-status').value;
      const staffSel = document.getElementById('edit-room-staff');
      const staffId = staffSel.value;
      const staffName = staffId ? staffSel.options[staffSel.selectedIndex].text : '';
      await updateDoc(doc(db, 'hotels', hotelId, 'rooms', editingRoomId), {
        number, status, assignedStaffId: staffId, assignedStaff: staffName
      });
      closeModal();
    };
    window.deleteRoom = async () => {
      if (!confirm(`¿Eliminar habitación ${editingRoomNumber}?`)) return;
      await deleteDoc(doc(db, 'hotels', hotelId, 'rooms', editingRoomId));
      closeModal();
    };
    window.showQR = () => {
      const url = `https://mauro7014.github.io/neoflux/guest/?h=${hotelId}&r=${editingRoomId}`;
