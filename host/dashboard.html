<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Panel Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00AEEF; --green: #39B54A; --blue: #0056A3;
      --navy: #1A1A2E; --font: 'Inter', sans-serif;
      --bg: #f5f7fa; --surface: #fff; --border: #e8f4fd;
      --muted: #8892a4; --danger: #e74c3c; --warning: #f39c12;
    }
    body { background: var(--bg); color: var(--navy); font-family: var(--font); min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, var(--navy), #0d1b2a);
      padding: 1.25rem 1.5rem;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .header-left { flex: 1; }
    .header-welcome { font-size: 0.75rem; color: rgba(255,255,255,0.5); font-weight: 500; margin-bottom: 0.2rem; }
    .header-name { font-size: 1.3rem; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .header-right { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.2rem; }
    .trial-badge { background: rgba(0,174,239,0.2); border: 1px solid rgba(0,174,239,0.4); border-radius: 8px; padding: 0.35rem 0.7rem; font-size: 0.72rem; font-weight: 700; color: var(--cyan); }
    .lang-select-header { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 0.35rem 0.5rem; font-family: var(--font); font-size: 0.78rem; font-weight: 600; color: #fff; outline: none; cursor: pointer; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 0.45rem 0.9rem; color: #fff; font-family: var(--font); font-size: 0.82rem; font-weight: 600; cursor: pointer; }

    .main-content { padding: 1.5rem; max-width: 540px; margin: 0 auto; }
    .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .nav-btn {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 20px; padding: 1.5rem 1rem;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.5rem; cursor: pointer; transition: all 0.22s;
      box-shadow: 0 2px 12px rgba(0,174,239,0.06);
      text-align: center; font-family: var(--font);
    }
    .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,174,239,0.15); border-color: var(--cyan); }
    .nav-btn:active { transform: scale(0.97); }
    .nav-btn.active { border: 2.5px solid var(--cyan); background: #f0f9ff; }
    .nav-btn-icon { font-size: 2rem; }
    .nav-btn-label { font-size: 1rem; font-weight: 700; color: var(--navy); }
    .nav-btn-count { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; }
    .nav-btn-count.green { color: var(--green); }
    .nav-btn-count.red { color: var(--danger); }
    .nav-btn-count.cyan { color: var(--cyan); }
    .nav-btn-count.orange { color: var(--warning); }
    .nav-btn-sub { font-size: 0.7rem; color: var(--muted); font-weight: 500; }

    .panel { display: none; }
    .panel.active { display: block; }

    .section-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin: 0 0 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .section-title::after { content:''; flex:1; height:1px; background: #eee; }

    .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; margin-bottom: 1rem; }
    .room-card { background: var(--surface); border: 2px solid var(--border); border-radius: 18px; padding: 1.1rem; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .room-card::before { content:''; position: absolute; top:0; left:0; right:0; height:4px; }
    .room-card.free::before { background: var(--green); }
    .room-card.occupied::before { background: var(--cyan); }
    .room-card.dirty::before { background: var(--danger); }
    .room-card.cleaning::before { background: var(--warning); }
    .room-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,174,239,0.12); border-color: var(--cyan); }
    .room-number { font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: 0.4rem; }
    .room-badge { font-size: 0.7rem; padding: 0.22rem 0.6rem; border-radius: 6px; display: inline-block; font-weight: 700; }
    .badge-free { background: rgba(57,181,74,0.12); color: #1e7a2e; }
    .badge-occupied { background: rgba(0,174,239,0.12); color: #0056A3; }
    .badge-dirty { background: rgba(231,76,60,0.12); color: #c0392b; }
    .badge-cleaning { background: rgba(243,156,18,0.12); color: #9a6000; }
    .room-staff { font-size: 0.68rem; color: var(--muted); margin-top: 0.35rem; font-weight: 500; }

    .btn-add { width: 100%; padding: 0.9rem; background: transparent; border: 2px dashed rgba(0,174,239,0.3); border-radius: 16px; color: var(--cyan); font-family: var(--font); font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 0.5rem; }
    .btn-add:hover { background: rgba(0,174,239,0.05); border-color: var(--cyan); }

    .order-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px; padding: 1.1rem; margin-bottom: 0.85rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .order-room-label { font-weight: 700; font-size: 0.95rem; color: var(--navy); }
    .order-badge { font-size: 0.7rem; padding: 0.22rem 0.65rem; border-radius: 6px; font-weight: 700; }
    .badge-pending { background: rgba(231,76,60,0.12); color: #c0392b; }
    .badge-progress { background: rgba(243,156,18,0.12); color: #9a6000; }
    .badge-done { background: rgba(57,181,74,0.12); color: #1e7a2e; }

    .list-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 0.9rem 1.1rem; margin-bottom: 0.65rem; display: flex; justify-content: space-between; align-items: center; }
    .list-item-name { font-weight: 600; font-size: 0.9rem; color: var(--navy); }
    .list-item-value { font-weight: 700; color: var(--cyan); font-size: 0.85rem; }
    .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; }
    .staff-role-tag { font-size: 0.7rem; color: var(--blue); font-weight: 700; background: rgba(0,86,163,0.1); padding: 0.22rem 0.6rem; border-radius: 6px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 1.5rem; z-index: 100; overflow-y: auto; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border-radius: 24px; padding: 1.75rem; width: 100%; max-width: 350px; box-shadow: 0 24px 64px rgba(0,0,0,0.12); margin: auto; }
    .modal h3 { font-size: 1rem; font-weight: 800; margin-bottom: 1.25rem; color: var(--navy); }
    .modal input, .modal select { width: 100%; background: var(--bg); border: 1.5px solid #e0e8f0; border-radius: 12px; padding: 0.9rem 1rem; color: var(--navy); font-family: var(--font); font-size: 0.92rem; font-weight: 500; margin-bottom: 0.75rem; outline: none; transition: border-color 0.2s; }
    .modal input:focus, .modal select:focus { border-color: var(--cyan); }
    .modal-btns { display: flex; gap: 0.65rem; margin-top: 0.5rem; }
    .btn-cancel { flex: 1; padding: 0.9rem; background: var(--bg); border: 1.5px solid #e0e8f0; border-radius: 12px; color: var(--muted); font-family: var(--font); font-size: 0.88rem; font-weight: 600; cursor: pointer; }
    .btn-save { flex: 1; padding: 0.9rem; background: linear-gradient(135deg, var(--cyan), var(--blue)); border: none; border-radius: 12px; color: #fff; font-weight: 700; font-family: var(--font); font-size: 0.88rem; cursor: pointer; box-shadow: 0 4px 12px rgba(0,174,239,0.3); }
    .btn-danger-modal { flex: 1; padding: 0.9rem; background: rgba(231,76,60,0.1); border: none; border-radius: 12px; color: var(--danger); font-weight: 700; font-family: var(--font); font-size: 0.88rem; cursor: pointer; }
    .btn-qr { flex: 1; padding: 0.9rem; background: rgba(0,86,163,0.1); border: none; border-radius: 12px; color: var(--blue); font-weight: 700; font-family: var(--font); font-size: 0.88rem; cursor: pointer; }
    .msg { margin-top: 0.75rem; font-size: 0.8rem; text-align: center; min-height: 1rem; font-weight: 500; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--green); }

    /* QR PREMIUM */
    .qr-modal-inner { text-align: center; }
    .qr-card {
      background: #fff; border-radius: 20px; padding: 2rem 1.5rem;
      margin: 1rem 0; border: 1px solid #eee;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .qr-hotel { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 700; margin-bottom: 0.3rem; }
    .qr-room { font-size: 1.3rem; font-weight: 800; color: var(--navy); margin-bottom: 1.25rem; }
    .qr-img-wrap { display: flex; justify-content: center; margin-bottom: 1.25rem; }
    .qr-footer-text { font-size: 0.75rem; color: var(--muted); font-weight: 500; margin-bottom: 0.3rem; }
    .qr-url-text { font-size: 0.55rem; color: #ccc; word-break: break-all; }
    .qr-powered { font-size: 0.65rem; color: #bbb; margin-top: 1rem; font-weight: 500; }
    .qr-powered strong { color: var(--navy); }

    .btn-sm { flex: 1; padding: 0.6rem; border: none; border-radius: 10px; font-family: var(--font); font-size: 0.82rem; font-weight: 700; cursor: pointer; }
    .btn-sm-progress { background: rgba(243,156,18,0.15); color: #9a6000; }
    .btn-sm-done { background: rgba(57,181,74,0.15); color: #1e7a2e; }
    .empty-state { text-align: center; color: var(--muted); padding: 2.5rem; font-size: 0.9rem; font-weight: 500; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="header-welcome" id="header-welcome">Bienvenido</div>
      <div class="header-name" id="hotel-name">Cargando...</div>
    </div>
    <div class="header-right">
      <span class="trial-badge hidden" id="trial-badge"></span>
      <select class="lang-select-header" id="lang-select" onchange="changeLang(this.value)">
        <option value="es">🇪🇸</option>
        <option value="it">🇮🇹</option>
        <option value="pt">🇧🇷</option>
        <option value="fr">🇫🇷</option>
        <option value="de">🇩🇪</option>
      </select>
      <button class="btn-logout" onclick="doLogout()" id="btn-logout">Salir</button>
    </div>
  </div>

  <div class="main-content">
    <div class="nav-grid">
      <button class="nav-btn active" onclick="showPanel('rooms',this)">
        <div class="nav-btn-icon">🚪</div>
        <div class="nav-btn-label" id="nb-rooms">Habitaciones</div>
        <div class="nav-btn-count green" id="stat-free">0</div>
        <div class="nav-btn-sub" id="nb-rooms-sub">libres</div>
      </button>
      <button class="nav-btn" onclick="showPanel('orders',this)">
        <div class="nav-btn-icon">🛎️</div>
        <div class="nav-btn-label" id="nb-orders">Pedidos</div>
        <div class="nav-btn-count red" id="stat-orders">0</div>
        <div class="nav-btn-sub" id="nb-orders-sub">pendientes</div>
      </button>
      <button class="nav-btn" onclick="showPanel('extras',this)">
        <div class="nav-btn-icon">💰</div>
        <div class="nav-btn-label" id="nb-extras">Extras</div>
        <div class="nav-btn-count cyan" id="stat-extras">0</div>
        <div class="nav-btn-sub" id="nb-extras-sub">configurados</div>
      </button>
      <button class="nav-btn" onclick="showPanel('staff',this)">
        <div class="nav-btn-icon">👥</div>
        <div class="nav-btn-label" id="nb-staff">Personal</div>
        <div class="nav-btn-count orange" id="stat-staff">0</div>
        <div class="nav-btn-sub" id="nb-staff-sub">registrados</div>
      </button>
    </div>

    <div id="panel-rooms" class="panel active">
      <p class="section-title" id="st-rooms">Habitaciones</p>
      <div class="rooms-grid" id="rooms-grid"></div>
      <button class="btn-add" onclick="openAddRoom()" id="btn-add-room">+ Agregar habitación</button>
    </div>
    <div id="panel-orders" class="panel">
      <p class="section-title" id="st-orders">Pedidos activos</p>
      <div id="orders-list"><p class="empty-state">Cargando...</p></div>
    </div>
    <div id="panel-extras" class="panel">
      <p class="section-title" id="st-extras">Extras configurados</p>
      <div id="extras-list"></div>
      <button class="btn-add" onclick="openAddExtra()" id="btn-add-extra">+ Agregar extra</button>
    </div>
    <div id="panel-staff" class="panel">
      <p class="section-title" id="st-staff">Personal registrado</p>
      <div id="staff-list"></div>
      <button class="btn-add" onclick="openAddStaff()" id="btn-add-staff">+ Registrar personal</button>
    </div>
  </div>

  <!-- Modal nueva habitación -->
  <div class="modal-overlay hidden" id="modal-add">
    <div class="modal">
      <h3>🚪 Nueva habitación</h3>
      <input type="text" id="room-number" placeholder="Número o nombre (ej: 101)"/>
      <select id="room-status">
        <option value="free">Libre</option>
        <option value="occupied">Ocupada</option>
        <option value="dirty">Sucia</option>
        <option value="cleaning">Limpiando</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addRoom()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal editar habitación -->
  <div class="modal-overlay hidden" id="modal-edit">
    <div class="modal">
      <h3 id="edit-room-title">Habitación</h3>
      <input type="text" id="edit-room-number" placeholder="Número o nombre"/>
      <select id="edit-room-status">
        <option value="free">Libre</option>
        <option value="occupied">Ocupada</option>
        <option value="dirty">Sucia</option>
        <option value="cleaning">Limpiando</option>
      </select>
      <select id="edit-room-staff"><option value="">Sin asignar</option></select>
      <div class="modal-btns">
        <button class="btn-qr" onclick="showQR()">📱 QR</button>
        <button class="btn-save" onclick="saveRoom()">Guardar</button>
      </div>
      <div class="modal-btns" style="margin-top:0.6rem">
        <button class="btn-danger-modal" onclick="deleteRoom()">🗑️ Eliminar</button>
        <button class="btn-cancel" onclick="closeModal()">Volver</button>
      </div>
    </div>
  </div>

  <!-- Modal QR PREMIUM -->
  <div class="modal-overlay hidden" id="modal-qr">
    <div class="modal qr-modal-inner">
      <div class="qr-card" id="qr-print-area">
        <div class="qr-hotel" id="qr-hotel-print"></div>
        <div class="qr-room" id="qr-room-print"></div>
        <div class="qr-img-wrap">
          <div id="qr-container"></div>
        </div>
        <div class="qr-footer-text">📱 Escaneá para hacer Check-In</div>
        <div class="qr-url-text" id="qr-url"></div>
        <div class="qr-powered">Powered by <strong>NeoFlux</strong></div>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="backToEdit()">← Volver</button>
        <button class="btn-save" onclick="printQR()">🖨️ Imprimir</button>
      </div>
      <div style="margin-top:0.6rem">
        <button class="btn-cancel" style="width:100%" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Modal extra -->
  <div class="modal-overlay hidden" id="modal-extra">
    <div class="modal">
      <h3>💰 Nuevo extra</h3>
      <input type="text" id="extra-name" placeholder="Nombre (ej: Toalla extra)"/>
      <input type="number" id="extra-price" placeholder="Precio (0 = sin cargo)"/>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addExtra()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal personal -->
  <div class="modal-overlay hidden" id="modal-staff">
    <div class="modal">
      <h3>👥 Registrar personal</h3>
      <input type="text" id="staff-name" placeholder="Nombre"/>
      <input type="email" id="staff-email" placeholder="Email"/>
      <input type="password" id="staff-password" placeholder="Contraseña (mín. 6 caracteres)"/>
      <select id="staff-role">
        <option value="cleaner">🧹 Mucama (solo Clean)</option>
        <option value="staff">👤 Staff (Host reducido)</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addStaff()">Registrar</button>
      </div>
      <p class="msg" id="staff-msg"></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let hotelId = null, hotelNameText = '', editingRoomId = null, editingRoomNumber = '', staffList = [];

    const T = {
      es: { welcome:'Bienvenido', logout:'Salir', rooms:'🚪 Habitaciones', orders:'🛎️ Pedidos', extras:'💰 Extras', staff:'👥 Personal', libres:'libres', pendientes:'pendientes', configurados:'configurados', registrados:'registrados', add_room:'+ Agregar habitación', add_extra:'+ Agregar extra', add_staff:'+ Registrar personal', free:'Libre', occupied:'Ocupada', dirty:'Sucia', cleaning:'Limpiando', no_orders:'✅ Sin pedidos pendientes', no_extras:'Sin extras configurados', no_staff:'Sin personal registrado', pending:'Pendiente', progress:'En curso', done:'Completado', sin_cargo:'Sin cargo', cleaner:'🧹 Mucama', staff_role:'👤 Staff', registered:'✅ Registrado', qr_scan:'📱 Escaneá para hacer Check-In' },
      it: { welcome:'Benvenuto', logout:'Esci', rooms:'🚪 Camere', orders:'🛎️ Ordini', extras:'💰 Extra', staff:'👥 Personale', libres:'libere', pendientes:'in attesa', configurados:'configurati', registrados:'registrati', add_room:'+ Aggiungi camera', add_extra:'+ Aggiungi extra', add_staff:'+ Registra personale', free:'Libera', occupied:'Occupata', dirty:'Sporca', cleaning:'In pulizia', no_orders:'✅ Nessun ordine', no_extras:'Nessun extra', no_staff:'Nessun personale', pending:'In attesa', progress:'In corso', done:'Completato', sin_cargo:'Gratuito', cleaner:'🧹 Cameriera', staff_role:'👤 Staff', registered:'✅ Registrato', qr_scan:'📱 Scansiona per il Check-In' },
      pt: { welcome:'Bem-vindo', logout:'Sair', rooms:'🚪 Quartos', orders:'🛎️ Pedidos', extras:'💰 Extras', staff:'👥 Pessoal', libres:'livres', pendientes:'pendentes', configurados:'configurados', registrados:'registrados', add_room:'+ Adicionar quarto', add_extra:'+ Adicionar extra', add_staff:'+ Registrar pessoal', free:'Livre', occupied:'Ocupado', dirty:'Sujo', cleaning:'Limpando', no_orders:'✅ Sem pedidos', no_extras:'Sem extras', no_staff:'Sem pessoal', pending:'Pendente', progress:'Em andamento', done:'Concluído', sin_cargo:'Gratuito', cleaner:'🧹 Camareira', staff_role:'👤 Staff', registered:'✅ Registrado', qr_scan:'📱 Escaneie para Check-In' },
      fr: { welcome:'Bienvenue', logout:'Déconnexion', rooms:'🚪 Chambres', orders:'🛎️ Commandes', extras:'💰 Extras', staff:'👥 Personnel', libres:'libres', pendientes:'en attente', configurados:'configurés', registrados:'enregistrés', add_room:'+ Ajouter chambre', add_extra:'+ Ajouter extra', add_staff:'+ Enregistrer personnel', free:'Libre', occupied:'Occupée', dirty:'Sale', cleaning:'En nettoyage', no_orders:'✅ Pas de commandes', no_extras:"Pas d'extras", no_staff:'Pas de personnel', pending:'En attente', progress:'En cours', done:'Terminé', sin_cargo:'Gratuit', cleaner:'🧹 Femme de chambre', staff_role:'👤 Staff', registered:'✅ Enregistré', qr_scan:'📱 Scannez pour le Check-In' },
      de: { welcome:'Willkommen', logout:'Abmelden', rooms:'🚪 Zimmer', orders:'🛎️ Bestellungen', extras:'💰 Extras', staff:'👥 Personal', libres:'frei', pendientes:'ausstehend', configurados:'konfiguriert', registrados:'registriert', add_room:'+ Zimmer hinzufügen', add_extra:'+ Extra hinzufügen', add_staff:'+ Personal registrieren', free:'Frei', occupied:'Belegt', dirty:'Schmutzig', cleaning:'Wird gereinigt', no_orders:'✅ Keine Bestellungen', no_extras:'Keine Extras', no_staff:'Kein Personal', pending:'Ausstehend', progress:'In Bearbeitung', done:'Abgeschlossen', sin_cargo:'Kostenlos', cleaner:'🧹 Zimmermädchen', staff_role:'👤 Staff', registered:'✅ Registriert', qr_scan:'📱 Scannen für Check-In' }
    };

    let lang = localStorage.getItem('nf_lang') || 'es';
    let L = T[lang];

    function applyLang() {
      L = T[lang];
      document.getElementById('lang-select').value = lang;
      document.getElementById('header-welcome').textContent = L.welcome;
      document.getElementById('btn-logout').textContent = L.logout;
      document.getElementById('nb-rooms').textContent = L.rooms;
      document.getElementById('nb-orders').textContent = L.orders;
      document.getElementById('nb-extras').textContent = L.extras;
      document.getElementById('nb-staff').textContent = L.staff;
      document.getElementById('nb-rooms-sub').textContent = L.libres;
      document.getElementById('nb-orders-sub').textContent = L.pendientes;
      document.getElementById('nb-extras-sub').textContent = L.configurados;
      document.getElementById('nb-staff-sub').textContent = L.registrados;
      document.getElementById('btn-add-room').textContent = L.add_room;
      document.getElementById('btn-add-extra').textContent = L.add_extra;
      document.getElementById('btn-add-staff').textContent = L.add_staff;
    }

    window.changeLang = (l) => { lang = l; localStorage.setItem('nf_lang', l); applyLang(); };

    const statusBadge = { free:'badge-free', occupied:'badge-occupied', dirty:'badge-dirty', cleaning:'badge-cleaning' };
    const statusClass = { free:'free', occupied:'occupied', dirty:'dirty', cleaning:'cleaning' };
    const orderBadge = { pending:'badge-pending', progress:'badge-progress', done:'badge-done' };

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      hotelId = user.uid;
      const hotelDoc = await getDoc(doc(db, 'hotels', hotelId));
      if (hotelDoc.exists()) {
        const data = hotelDoc.data();
        hotelNameText = data.name;
        document.getElementById('hotel-name').textContent = data.name;
        if (data.trialEnds) {
          const end = data.trialEnds?.toDate?.();
          if (end) {
            const days = Math.ceil((end - new Date()) / 86400000);
            const badge = document.getElementById('trial-badge');
            badge.textContent = days > 0 ? `⏱ ${days}d` : '⚠️';
            badge.classList.remove('hidden');
          }
        }
      }
      applyLang();
      loadRooms(); loadExtras(); loadStaff(); loadOrders();
    });

    window.showPanel = (panel, btn) => {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + panel).classList.add('active');
      btn.classList.add('active');
    };

    function loadRooms() {
      onSnapshot(collection(db, 'hotels', hotelId, 'rooms'), (snap) => {
        const grid = document.getElementById('rooms-grid');
        grid.innerHTML = '';
        let freeCount = 0;
        snap.forEach(d => {
          const r = d.data();
          if (r.status === 'free') freeCount++;
          const card = document.createElement('div');
          card.className = `room-card ${statusClass[r.status]}`;
          card.innerHTML = `
            <div class="room-number">🚪 ${r.number}</div>
            <span class="room-badge ${statusBadge[r.status]}">${L[r.status]||r.status}</span>
            ${r.assignedStaff ? `<div class="room-staff">👤 ${r.assignedStaff}</div>` : ''}
          `;
          card.onclick = () => openEditRoom(d.id, r.number, r.status, r.assignedStaffId);
          grid.appendChild(card);
        });
        document.getElementById('stat-free').textContent = freeCount;
      });
    }

    window.openAddRoom = () => document.getElementById('modal-add').classList.remove('hidden');
    window.addRoom = async () => {
      const number = document.getElementById('room-number').value.trim();
      const status = document.getElementById('room-status').value;
      if (!number) return;
      await addDoc(collection(db, 'hotels', hotelId, 'rooms'), { number, status });
      closeModal(); document.getElementById('room-number').value = '';
    };
    window.openEditRoom = (id, number, status, assignedStaffId) => {
      editingRoomId = id; editingRoomNumber = number;
      document.getElementById('edit-room-title').textContent = `🚪 ${number}`;
      document.getElementById('edit-room-number').value = number;
      document.getElementById('edit-room-status').value = status;
      const sel = document.getElementById('edit-room-staff');
      sel.innerHTML = '<option value="">Sin asignar</option>';
      staffList.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.uid; opt.textContent = s.name;
        if (s.uid === assignedStaffId) opt.selected = true;
        sel.appendChild(opt);
      });
      document.getElementById('modal-edit').classList.remove('hidden');
    };
    window.saveRoom = async () => {
      const number = document.getElementById('edit-room-number').value.trim();
      const status = document.getElementById('edit-room-status').value;
      const staffSel = document.getElementById('edit-room-staff');
      const staffId = staffSel.value;
      const staffName = staffId ? staffSel.options[staffSel.selectedIndex].text : '';
      await updateDoc(doc(db, 'hotels', hotelId, 'rooms', editingRoomId), { number, status, assignedStaffId: staffId, assignedStaff: staffName });
      closeModal();
    };
    window.deleteRoom = async () => {
      if (!confirm(`¿Eliminar habitación ${editingRoomNumber}?`)) return;
      await deleteDoc(doc(db, 'hotels', hotelId, 'rooms', editingRoomId));
      closeModal();
    };

    window.showQR = () => {
      const url = `https://mauro7014.github.io/neoflux/guest/?h=${hotelId}&r=${editingRoomId}`;
      document.getElementById('qr-hotel-print').textContent = hotelNameText.toUpperCase();
      document.getElementById('qr-room-print').textContent = `Habitación ${editingRoomNumber}`;
      document.getElementById('qr-url').textContent = url;
      document.getElementById('qr-container').innerHTML = '';
      new QRCode(document.getElementById('qr-container'), {
        text: url, width: 200, height: 200,
        colorDark: '#1A1A2E', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      document.getElementById('modal-edit').classList.add('hidden');
      document.getElementById('modal-qr').classList.remove('hidden');
    };

    window.backToEdit = () => {
      document.getElementById('modal-qr').classList.add('hidden');
      document.getElementById('modal-edit').classList.remove('hidden');
    };

    window.printQR = () => {
      const area = document.getElementById('qr-print-area').innerHTML;
      const win = window.open('', '_blank');
      win.document.write(`
        <!DOCTYPE html><html><head>
        <title>QR — Habitación ${editingRoomNumber}</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: 'Inter', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
          .wrap { background: #fff; border-radius: 24px; padding: 2.5rem 2rem; text-align: center; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
          .qr-hotel { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; font-weight: 700; margin-bottom: 0.3rem; }
          .qr-room { font-size: 1.4rem; font-weight: 800; color: #1A1A2E; margin-bottom: 1.5rem; }
          .qr-img-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
          .qr-footer-text { font-size: 0.8rem; color: #888; font-weight: 500; margin-bottom: 0.5rem; }
          .qr-url-text { font-size: 0.5rem; color: #ccc; word-break: break-all; margin-bottom: 1rem; }
          .qr-powered { font-size: 0.65rem; color: #bbb; font-weight: 500; border-top: 1px solid #f0f0f0; padding-top: 0.85rem; margin-top: 0.5rem; }
          .qr-powered strong { color: #1A1A2E; }
          img { max-width: 200px; }
        </style></head>
        <body><div class="wrap">${area}</div></body></html>
      `);
      win.document.close();
      setTimeout(() => win.print(), 600);
    };

    function loadOrders() {
      const q = query(collection(db, 'hotels', hotelId, 'orders'), orderBy('createdAt', 'desc'));
      onSnapshot(q, (snap) => {
        const list = document.getElementById('orders-list'); list.innerHTML = '';
        const orders = []; snap.forEach(d => orders.push({ id: d.id, ...d.data() }));
        const active = orders.filter(o => o.status !== 'done');
        document.getElementById('stat-orders').textContent = active.length;
        if (active.length === 0) { list.innerHTML = `<p class="empty-state">${L.no_orders}</p>`; return; }
        active.forEach(o => {
          const card = document.createElement('div'); card.className = 'order-card';
          const itemsText = o.items ? o.items.map(i => i.name).join(', ') : '';
          const time = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : '';
          card.innerHTML = `
            <div class="order-header">
              <span class="order-room-label">🚪 ${o.roomNumber||'—'}${o.guestName?' · '+o.guestName:''}</span>
              <span class="order-badge ${orderBadge[o.status]}">${L[o.status]||o.status}</span>
            </div>
            ${itemsText?`<p style="font-size:.82rem;color:var(--muted);margin-bottom:.3rem">📦 ${itemsText}</p>`:''}
            ${o.note?`<p style="font-size:.78rem;color:var(--muted);margin-bottom:.3rem">📝 ${o.note}</p>`:''}
            ${o.total>0?`<p style="font-size:.82rem;font-weight:700;color:var(--cyan);margin-bottom:.5rem">💰 $${o.total}</p>`:''}
            <p style="font-size:.7rem;color:var(--muted);margin-bottom:.5rem">🕐 ${time}</p>
            <div style="display:flex;gap:.5rem">
              ${o.status==='pending'?`<button class="btn-sm btn-sm-progress" onclick="updateOrder('${o.id}','progress')">▶ ${L.progress}</button>`:''}
              ${o.status==='progress'?`<button class="btn-sm btn-sm-done" onclick="updateOrder('${o.id}','done')">✓ ${L.done}</button>`:''}
            </div>`;
          list.appendChild(card);
        });
      });
    }
    window.updateOrder = async (id, status) => { await updateDoc(doc(db, 'hotels', hotelId, 'orders', id), { status }); };

    function loadExtras() {
      onSnapshot(collection(db, 'hotels', hotelId, 'extras'), (snap) => {
        const list = document.getElementById('extras-list'); list.innerHTML = '';
        document.getElementById('stat-extras').textContent = snap.size;
        if (snap.empty) { list.innerHTML = `<p class="empty-state">${L.no_extras}</p>`; return; }
        snap.forEach(d => {
          const e = d.data(); const item = document.createElement('div'); item.className = 'list-item';
          item.innerHTML = `<span class="list-item-name">${e.name}</span>
            <div style="display:flex;align-items:center;gap:.75rem">
              <span class="list-item-value">${e.price>0?'$'+e.price:L.sin_cargo}</span>
              <button class="btn-del" onclick="deleteExtra('${d.id}')">🗑️</button>
            </div>`;
          list.appendChild(item);
        });
      });
    }
    window.openAddExtra = () => document.getElementById('modal-extra').classList.remove('hidden');
    window.addExtra = async () => {
      const name = document.getElementById('extra-name').value.trim();
      const price = parseFloat(document.getElementById('extra-price').value)||0;
      if (!name) return;
      await addDoc(collection(db, 'hotels', hotelId, 'extras'), { name, price });
      closeModal(); document.getElementById('extra-name').value=''; document.getElementById('extra-price').value='';
    };
    window.deleteExtra = async (id) => { await deleteDoc(doc(db, 'hotels', hotelId, 'extras', id)); };

    function loadStaff() {
      onSnapshot(collection(db, 'hotels', hotelId, 'staff'), (snap) => {
        staffList = []; const list = document.getElementById('staff-list'); list.innerHTML = '';
        document.getElementById('stat-staff').textContent = snap.size;
        if (snap.empty) { list.innerHTML = `<p class="empty-state">${L.no_staff}</p>`; return; }
        snap.forEach(d => {
          const s = d.data(); staffList.push(s);
          const item = document.createElement('div'); item.className = 'list-item';
          item.innerHTML = `<div><p class="list-item-name">${s.name}</p><p style="font-size:.7rem;color:var(--muted)">${s.email}</p></div>
            <span class="staff-role-tag">${s.role==='cleaner'?L.cleaner:L.staff_role}</span>`;
          list.appendChild(item);
        });
      });
    }
    window.openAddStaff = () => document.getElementById('modal-staff').classList.remove('hidden');
    window.addStaff = async () => {
      const name = document.getElementById('staff-name').value.trim();
      const email = document.getElementById('staff-email').value.trim();
      const password = document.getElementById('staff-password').value;
      const role = document.getElementById('staff-role').value;
      const msg = document.getElementById('staff-msg');
      msg.className='msg'; msg.textContent='...';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', cred.user.uid), { name, email, role, hotelId });
        await addDoc(collection(db, 'hotels', hotelId, 'staff'), { name, email, uid: cred.user.uid, role });
        msg.className='msg ok'; msg.textContent=L.registered;
        document.getElementById('staff-name').value='';
        document.getElementById('staff-email').value='';
        document.getElementById('staff-password').value='';
      } catch(e) { msg.className='msg error'; msg.textContent=e.message; }
    };

    window.closeModal = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
    window.doLogout = async () => { await signOut(auth); window.location.href = 'index.html'; };
  </script>
</body>
</html>
