<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Panel Host</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface2: #f0f2f5;
      --gold: #e8c87a;
      --gold2: #c9a84c;
      --text: #1a1a2e;
      --muted: #6b7280;
      --success: #3fb950;
      --danger: #f85149;
      --warning: #d29922;
      --blue: #58a6ff;
      --radius: 16px;
      --font: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-logo { width: 44px; height: 44px; object-fit: contain; }
    .header-title { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .header-sub { font-size: 0.7rem; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 0.5rem; }
    .btn-icon {
      background: var(--surface2); border: 1px solid #30363d; border-radius: 10px;
      padding: 0.5rem 0.75rem; color: var(--muted); font-size: 0.8rem;
      cursor: pointer; font-family: var(--font); transition: all 0.2s;
    }
    .btn-icon:hover { border-color: var(--gold); color: var(--gold); }
    .hotel-badge {
      background: var(--surface2); border: 1px solid #30363d; border-radius: 10px;
      padding: 0.4rem 0.75rem; font-size: 0.8rem; font-weight: 600; color: var(--gold);
    }

    /* NAV TABS */
    .nav-tabs {
      display: flex; gap: 0; background: var(--surface);
      border-bottom: 1px solid #e5e7eb;; overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab {
      flex: 1; min-width: 80px; padding: 0.85rem 0.5rem; border: none;
      background: transparent; color: var(--muted); font-family: var(--font);
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .nav-tab:hover { color: var(--text); }

    /* CONTENT */
    .content { padding: 1.25rem; max-width: 520px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 1.25rem; }
    .stat-card {
      background: var(--surface); border: 1px solid #30363d; border-radius: 12px;
      padding: 0.75rem 0.5rem; text-align: center;
    }
    .stat-number { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
    .stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.5px; }

    /* SECTION TITLE */
    .section-title {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 0.75rem; margin-top: 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: #30363d; }

    /* ROOMS GRID */
    .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .room-card {
      background: var(--surface); border: 1px solid #30363d; border-radius: var(--radius);
      padding: 1rem; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .room-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--status-color, #30363d);
    }
    .room-card:hover { border-color: var(--gold); transform: translateY(-1px); }
    .room-card.free { --status-color: #3fb950; }
    .room-card.occupied { --status-color: #58a6ff; }
    .room-card.dirty { --status-color: #f85149; }
    .room-card.cleaning { --status-color: #d29922; }
    .room-number { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
    .room-status-badge {
      font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 6px;
      display: inline-block; font-weight: 600;
    }
    .badge-free { background: rgba(63,185,80,0.15); color: #3fb950; }
    .badge-occupied { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .badge-dirty { background: rgba(248,81,73,0.15); color: #f85149; }
    .badge-cleaning { background: rgba(210,153,34,0.15); color: #d29922; }
    .room-staff-tag { font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; }

    /* BTN ADD */
    .btn-add {
      width: 100%; padding: 0.8rem; background: transparent;
      border: 1px dashed #30363d; border-radius: var(--radius); color: var(--muted);
      font-family: var(--font); font-size: 0.9rem; cursor: pointer;
      transition: all 0.2s; margin-bottom: 0.5rem;
    }
    .btn-add:hover { border-color: var(--gold); color: var(--gold); }

    /* ORDER CARDS */
    .order-card {
      background: var(--surface); border: 1px solid #30363d; border-radius: var(--radius);
      padding: 1rem; margin-bottom: 0.75rem; transition: border-color 0.2s;
    }
    .order-card:hover { border-color: #58a6ff; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .order-room-label { font-weight: 700; font-size: 0.95rem; }
    .order-badge {
      font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 6px; font-weight: 600;
    }
    .badge-pending { background: rgba(248,81,73,0.15); color: #f85149; }
    .badge-progress { background: rgba(210,153,34,0.15); color: #d29922; }
    .badge-done { background: rgba(63,185,80,0.15); color: #3fb950; }
    .order-items-text { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.3rem; }
    .order-note-text { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; }
    .order-total-text { font-size: 0.85rem; font-weight: 700; color: var(--gold); margin-bottom: 0.6rem; }
    .order-actions { display: flex; gap: 0.5rem; }
    .btn-sm {
      flex: 1; padding: 0.45rem; border: none; border-radius: 8px;
      font-family: var(--font); font-size: 0.78rem; font-weight: 700; cursor: pointer;
    }
    .btn-progress-sm { background: rgba(210,153,34,0.2); color: #d29922; }
    .btn-done-sm { background: rgba(63,185,80,0.2); color: #3fb950; }

    /* EXTRAS & STAFF */
    .list-item {
      background: var(--surface); border: 1px solid #30363d; border-radius: 12px;
      padding: 0.75rem 1rem; margin-bottom: 0.5rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .list-item-name { font-weight: 600; font-size: 0.9rem; }
    .list-item-value { font-weight: 700; color: var(--gold); font-size: 0.85rem; }
    .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; padding: 0.2rem; }
    .staff-role-tag { font-size: 0.7rem; color: var(--blue); font-weight: 600; background: rgba(88,166,255,0.1); padding: 0.2rem 0.5rem; border-radius: 6px; }

    /* MODALS */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; z-index: 100; overflow-y: auto;
    }
    .modal {
      background: var(--surface); border: 1px solid #30363d; border-radius: 20px;
      padding: 1.5rem; width: 100%; max-width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5); margin: auto;
    }
    .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); }
    .modal input, .modal select {
      width: 100%; background: var(--bg); border: 1px solid #30363d;
      border-radius: 10px; padding: 0.75rem 1rem; color: var(--text);
      font-family: var(--font); font-size: 0.9rem; margin-bottom: 0.75rem;
      outline: none; transition: border-color 0.2s;
    }
    .modal input:focus, .modal select:focus { border-color: var(--gold); }
    .modal input::placeholder { color: var(--muted); }
    .modal select option { background: var(--surface); }
    .modal-btns { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .btn-cancel {
      flex: 1; padding: 0.75rem; background: transparent; border: 1px solid #30363d;
      border-radius: 10px; color: var(--muted); font-family: var(--font); cursor: pointer;
    }
    .btn-save {
      flex: 1; padding: 0.75rem; background: var(--gold); border: none;
      border-radius: 10px; color: #000; font-weight: 700; font-family: var(--font); cursor: pointer;
    }
    .btn-danger-modal {
      flex: 1; padding: 0.75rem; background: rgba(248,81,73,0.15); border: none;
      border-radius: 10px; color: var(--danger); font-weight: 700; font-family: var(--font); cursor: pointer;
    }
    .msg { margin-top: 0.75rem; font-size: 0.8rem; text-align: center; min-height: 1rem; color: var(--muted); }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--success); }

    /* QR */
    #qr-container { display: flex; justify-content: center; margin: 1rem 0; background: #fff; padding: 1rem; border-radius: 12px; }
    .qr-url { font-size: 0.65rem; color: var(--muted); text-align: center; word-break: break-all; margin-bottom: 0.5rem; }

    .hidden { display: none; }
    .empty-state { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="../images/host.png" alt="Host" class="header-logo"/>
      <div>
        <div class="header-title">NeoFlux Host</div>
        <div class="header-sub" id="hotel-name">Cargando...</div>
      </div>
    </div>
    <div class="header-right">
      <span class="hotel-badge" id="trial-badge"></span>
      <button class="btn-icon" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('rooms',this)">🚪 Habitaciones</button>
    <button class="nav-tab" onclick="showTab('orders',this)">🛎️ Pedidos</button>
    <button class="nav-tab" onclick="showTab('extras',this)">💰 Extras</button>
    <button class="nav-tab" onclick="showTab('staff',this)">👥 Personal</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- TAB HABITACIONES -->
    <div id="tab-rooms" class="tab-content active">
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-number" id="stat-free">0</div><div class="stat-label">Libres</div></div>
        <div class="stat-card"><div class="stat-number" id="stat-occupied">0</div><div class="stat-label">Ocupadas</div></div>
        <div class="stat-card"><div class="stat-number" id="stat-dirty">0</div><div class="stat-label">Sucias</div></div>
        <div class="stat-card"><div class="stat-number" id="stat-cleaning">0</div><div class="stat-label">Limpiando</div></div>
      </div>
      <p class="section-title">Habitaciones</p>
      <div class="rooms-grid" id="rooms-grid"></div>
      <button class="btn-add" onclick="openAddRoom()">+ Agregar habitación</button>
    </div>

    <!-- TAB PEDIDOS -->
    <div id="tab-orders" class="tab-content">
      <p class="section-title">Pedidos activos</p>
      <div id="orders-list"><p class="empty-state">Cargando...</p></div>
    </div>

    <!-- TAB EXTRAS -->
    <div id="tab-extras" class="tab-content">
      <p class="section-title">Extras configurados</p>
      <div id="extras-list"></div>
      <button class="btn-add" onclick="openAddExtra()">+ Agregar extra</button>
    </div>

    <!-- TAB PERSONAL -->
    <div id="tab-staff" class="tab-content">
      <p class="section-title">Personal registrado</p>
      <div id="staff-list"></div>
      <button class="btn-add" onclick="openAddStaff()">+ Registrar personal</button>
    </div>

  </div>

  <!-- Modal nueva habitación -->
  <div class="modal-overlay hidden" id="modal-add">
    <div class="modal">
      <h3>🚪 Nueva habitación</h3>
      <input type="text" id="room-number" placeholder="Número o nombre (ej: 101)"/>
      <select id="room-status">
        <option value="free">Libre</option>
        <option value="occupied">Ocupada</option>
        <option value="dirty">Sucia</option>
        <option value="cleaning">Limpiando</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addRoom()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal editar habitación -->
  <div class="modal-overlay hidden" id="modal-edit">
    <div class="modal">
      <h3 id="edit-room-title">Habitación</h3>
      <input type="text" id="edit-room-number" placeholder="Número o nombre"/>
      <select id="edit-room-status">
        <option value="free">Libre</option>
        <option value="occupied">Ocupada</option>
        <option value="dirty">Sucia</option>
        <option value="cleaning">Limpiando</option>
      </select>
      <select id="edit-room-staff">
        <option value="">Sin asignar</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="showQR()">📱 QR</button>
        <button class="btn-save" onclick="saveRoom()">Guardar</button>
      </div>
      <div class="modal-btns" style="margin-top:0.5rem">
        <button class="btn-danger-modal" onclick="deleteRoom()">🗑️ Eliminar</button>
        <button class="btn-cancel" onclick="closeModal()">Volver</button>
      </div>
    </div>
  </div>

  <!-- Modal QR -->
  <div class="modal-overlay hidden" id="modal-qr">
    <div class="modal" style="text-align:center">
      <h3 id="qr-title">QR Habitación</h3>
      <p class="qr-url" id="qr-url"></p>
      <div id="qr-container"></div>
      <p style="font-size:0.78rem;color:var(--muted);margin-bottom:1rem">El huésped escanea este QR para hacer check-in</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="backToEdit()">← Volver</button>
        <button class="btn-save" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Modal extra -->
  <div class="modal-overlay hidden" id="modal-extra">
    <div class="modal">
      <h3>💰 Nuevo extra</h3>
      <input type="text" id="extra-name" placeholder="Nombre (ej: Toalla extra)"/>
      <input type="number" id="extra-price" placeholder="Precio (0 = sin cargo)"/>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addExtra()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal personal -->
  <div class="modal-overlay hidden" id="modal-staff">
    <div class="modal">
      <h3>👥 Registrar personal</h3>
      <input type="text" id="staff-name" placeholder="Nombre"/>
      <input type="email" id="staff-email" placeholder="Email"/>
      <input type="password" id="staff-password" placeholder="Contraseña (mín. 6 caracteres)"/>
      <select id="staff-role">
        <option value="cleaner">🧹 Mucama (solo Clean)</option>
        <option value="staff">👤 Staff (Host reducido)</option>
      </select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="addStaff()">Registrar</button>
      </div>
      <p class="msg" id="staff-msg"></p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let hotelId = null;
    let editingRoomId = null;
    let editingRoomNumber = '';
    let staffList = [];

    const statusClass = { free:'free', occupied:'occupied', dirty:'dirty', cleaning:'cleaning' };
    const statusBadge = { free:'badge-free', occupied:'badge-occupied', dirty:'badge-dirty', cleaning:'badge-cleaning' };
    const statusLabel = { free:'Libre', occupied:'Ocupada', dirty:'Sucia', cleaning:'Limpiando' };
    const orderBadge = { pending:'badge-pending', progress:'badge-progress', done:'badge-done' };
    const orderLabel = { pending:'Pendiente', progress:'En curso', done:'Completado' };

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      hotelId = user.uid;
      const hotelDoc = await getDoc(doc(db, 'hotels', hotelId));
      if (hotelDoc.exists()) {
        const data = hotelDoc.data();
        document.getElementById('hotel-name').textContent = data.name;
        if (data.plan === 'trial') {
          const end = data.trialEnds?.toDate?.();
          if (end) {
            const days = Math.ceil((end - new Date()) / 86400000);
            document.getElementById('trial-badge').textContent = days > 0 ? `⏱ ${days}d prueba` : '⚠️ Trial expirado';
          }
        }
      }
      loadRooms();
      loadExtras();
      loadStaff();
      loadOrders();
    });

    // TABS
    window.showTab = (tab, btn) => {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
    };

    // HABITACIONES
    function loadRooms() {
      onSnapshot(collection(db, 'hotels', hotelId, 'rooms'), (snap) => {
        const grid = document.getElementById('rooms-grid');
        grid.innerHTML = '';
        let counts = { free:0, occupied:0, dirty:0, cleaning:0 };
        snap.forEach(d => {
          const r = d.data();
          counts[r.status] = (counts[r.status] || 0) + 1;
          const card = document.createElement('div');
          card.className = `room-card ${statusClass[r.status]}`;
          card.innerHTML = `
            <div class="room-number">🚪 ${r.number}</div>
            <span class="room-status-badge ${statusBadge[r.status]}">${statusLabel[r.status]}</span>
            ${r.assignedStaff ? `<div class="room-staff-tag">👤 ${r.assignedStaff}</div>` : ''}
          `;
          card.onclick = () => openEditRoom(d.id, r.number, r.status, r.assignedStaffId);
          grid.appendChild(card);
        });
        document.getElementById('stat-free').textContent = counts.free;
        document.getElementById('stat-occupied').textContent = counts.occupied;
        document.getElementById('stat-dirty').textContent = counts.dirty;
        document.getElementById('stat-cleaning').textContent = counts.cleaning;
      });
    }

    window.openAddRoom = () => document.getElementById('modal-add').classList.remove('hidden');
    window.addRoom = async () => {
      const number = document.getElementById('room-number').value.trim();
      const status = document.getElementById('room-status').value;
      if (!number) return;
      await addDoc(collection(db, 'hotels', hotelId, 'rooms'), { number, status });
      closeModal();
      document.getElementById('room-number').value = '';
    };
    window.openEditRoom = (id, number, status, assignedStaffId) => {
      editingRoomId = id;
      editingRoomNumber = number;
      document.getElementById('edit-room-title').textContent = `🚪 Habitación ${number}`;
      document.getElementById('edit-room-number').value = number;
      document.getElementById('edit-room-status').value = status;
      const sel = document.getElementById('edit-room-staff');
      sel.innerHTML = '<option value="">Sin asignar</option>';
      staffList.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.uid;
        opt.textContent = s.name;
        if (s.uid === assignedStaffId) opt.selected = true;
        sel.appendChild(opt);
      });
      document.getElementById('modal-edit').classList.remove('hidden');
    };
    window.saveRoom = async () => {
      const number = document.getElementById('edit-room-number').value.trim();
      const status = document.getElementById('edit-room-status').value;
      const staffSel = document.getElementById('edit-room-staff');
      const staffId = staffSel.value;
      const staffName = staffId ? staffSel.options[staffSel.selectedIndex].text : '';
      await updateDoc(doc(db, 'hotels', hotelId, 'rooms', editingRoomId), { number, status, assignedStaffId: staffId, assignedStaff: staffName });
      closeModal();
    };
    window.deleteRoom = async () => {
      if (!confirm(`¿Eliminar habitación ${editingRoomNumber}?`)) return;
      await deleteDoc(doc(db, 'hotels', hotelId, 'rooms', editingRoomId));
      closeModal();
    };
    window.showQR = () => {
      const url = `https://mauro7014.github.io/neoflux/guest/?h=${hotelId}&r=${editingRoomId}`;
      document.getElementById('qr-title').textContent = `QR — Habitación ${editingRoomNumber}`;
      document.getElementById('qr-url').textContent = url;
      document.getElementById('qr-container').innerHTML = '';
      new QRCode(document.getElementById('qr-container'), { text: url, width: 180, height: 180, colorDark:'#0d1117', colorLight:'#ffffff' });
      document.getElementById('modal-edit').classList.add('hidden');
      document.getElementById('modal-qr').classList.remove('hidden');
    };
    window.backToEdit = () => {
      document.getElementById('modal-qr').classList.add('hidden');
      document.getElementById('modal-edit').classList.remove('hidden');
    };

    // PEDIDOS
    function loadOrders() {
      const q = query(collection(db, 'hotels', hotelId, 'orders'), orderBy('createdAt', 'desc'));
      onSnapshot(q, (snap) => {
        const list = document.getElementById('orders-list');
        list.innerHTML = '';
        const orders = [];
        snap.forEach(d => orders.push({ id: d.id, ...d.data() }));
        const active = orders.filter(o => o.status !== 'done');
        if (active.length === 0) { list.innerHTML = '<p class="empty-state">✅ Sin pedidos pendientes</p>'; return; }
        active.forEach(o => {
          const card = document.createElement('div');
          card.className = 'order-card';
          const itemsText = o.items ? o.items.map(i => i.name).join(', ') : '';
          const time = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'}) : '';
          card.innerHTML = `
            <div class="order-header">
              <span class="order-room-label">🚪 ${o.roomNumber || '—'}</span>
              <span class="order-badge ${orderBadge[o.status]}">${orderLabel[o.status]}</span>
            </div>
            ${itemsText ? `<p class="order-items-text">📦 ${itemsText}</p>` : ''}
            ${o.note ? `<p class="order-note-text">📝 ${o.note}</p>` : ''}
            ${o.total > 0 ? `<p class="order-total-text">💰 $${o.total}</p>` : ''}
            <p style="font-size:0.72rem;color:var(--muted);margin-bottom:0.5rem">🕐 ${time}</p>
            <div class="order-actions">
              ${o.status === 'pending' ? `<button class="btn-sm btn-progress-sm" onclick="updateOrder('${o.id}','progress')">En curso</button>` : ''}
              ${o.status === 'progress' ? `<button class="btn-sm btn-done-sm" onclick="updateOrder('${o.id}','done')">Completado ✓</button>` : ''}
            </div>
          `;
          list.appendChild(card);
        });
      });
    }
    window.updateOrder = async (id, status) => {
      await updateDoc(doc(db, 'hotels', hotelId, 'orders', id), { status });
    };

    // EXTRAS
    function loadExtras() {
      onSnapshot(collection(db, 'hotels', hotelId, 'extras'), (snap) => {
        const list = document.getElementById('extras-list');
        list.innerHTML = '';
        if (snap.empty) { list.innerHTML = '<p class="empty-state">Sin extras configurados</p>'; return; }
        snap.forEach(d => {
          const e = d.data();
          const item = document.createElement('div');
          item.className = 'list-item';
          item.innerHTML = `
            <span class="list-item-name">${e.name}</span>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <span class="list-item-value">${e.price > 0 ? '$'+e.price : 'Sin cargo'}</span>
              <button class="btn-del" onclick="deleteExtra('${d.id}')">🗑️</button>
            </div>
          `;
          list.appendChild(item);
        });
      });
    }
    window.openAddExtra = () => document.getElementById('modal-extra').classList.remove('hidden');
    window.addExtra = async () => {
      const name = document.getElementById('extra-name').value.trim();
      const price = parseFloat(document.getElementById('extra-price').value) || 0;
      if (!name) return;
      await addDoc(collection(db, 'hotels', hotelId, 'extras'), { name, price });
      closeModal();
      document.getElementById('extra-name').value = '';
      document.getElementById('extra-price').value = '';
    };
    window.deleteExtra = async (id) => {
      await deleteDoc(doc(db, 'hotels', hotelId, 'extras', id));
    };

    // STAFF
    function loadStaff() {
      onSnapshot(collection(db, 'hotels', hotelId, 'staff'), (snap) => {
        staffList = [];
        const list = document.getElementById('staff-list');
        list.innerHTML = '';
        if (snap.empty) { list.innerHTML = '<p class="empty-state">Sin personal registrado</p>'; return; }
        snap.forEach(d => {
          const s = d.data();
          staffList.push(s);
          const item = document.createElement('div');
          item.className = 'list-item';
          item.innerHTML = `
            <div>
              <p class="list-item-name">${s.name}</p>
              <p style="font-size:0.72rem;color:var(--muted)">${s.email}</p>
            </div>
            <span class="staff-role-tag">${s.role === 'cleaner' ? '🧹 Mucama' : '👤 Staff'}</span>
          `;
          list.appendChild(item);
        });
      });
    }
    window.openAddStaff = () => document.getElementById('modal-staff').classList.remove('hidden');
    window.addStaff = async () => {
      const name = document.getElementById('staff-name').value.trim();
      const email = document.getElementById('staff-email').value.trim();
      const password = document.getElementById('staff-password').value;
      const role = document.getElementById('staff-role').value;
      const msg = document.getElementById('staff-msg');
      msg.className = 'msg'; msg.textContent = 'Registrando...';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', cred.user.uid), { name, email, role, hotelId });
        await addDoc(collection(db, 'hotels', hotelId, 'staff'), { name, email, uid: cred.user.uid, role });
        msg.className = 'msg ok'; msg.textContent = '✅ Personal registrado';
        document.getElementById('staff-name').value = '';
        document.getElementById('staff-email').value = '';
        document.getElementById('staff-password').value = '';
      } catch(e) {
        msg.className = 'msg error'; msg.textContent = e.message;
      }
    };

    // GENERAL
    window.closeModal = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
    window.doLogout = async () => { await signOut(auth); window.location.href = 'index.html'; };
  </script>
</body>
</html>
