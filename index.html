<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#ffffff"/>
  <link rel="icon" type="image/png" href="images/neoflux.png"/>
  <link rel="apple-touch-icon" href="images/neoflux.png"/>
  <link rel="manifest" href="manifest.json"/>
  <title>NeoFlux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00AEEF; --navy: #1A1A2E; --font: 'Inter', sans-serif;
    }
    body { background: #fff; font-family: var(--font); min-height: 100vh; }

    /* SPLASH */
    #splash {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }

    .splash-logo {
      width: 160px; height: 160px; object-fit: contain;
      animation: zoomIn 1.6s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
      opacity: 0;
    }
    @keyframes zoomIn {
      0% { transform: scale(0.15); opacity: 0; }
      60% { opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .splash-powered {
      position: absolute; bottom: 2.5rem;
      font-size: 0.82rem; color: #aaa; font-weight: 500; letter-spacing: 0.2px;
    }
    .splash-powered strong { color: #333; font-weight: 700; }

    /* LANDING */
    #landing { display: none; min-height: 100vh; background: #fff; }

    .lang-bar {
      display: flex; justify-content: flex-end; padding: 1rem 1.5rem 0;
    }
    .lang-select {
      background: #f5f5f5; border: 1.5px solid #e8e8e8;
      border-radius: 10px; padding: 0.45rem 0.85rem;
      font-family: var(--font); font-size: 0.82rem; font-weight: 600;
      color: var(--navy); outline: none; cursor: pointer;
    }
    .lang-select:focus { border-color: var(--cyan); }

    .hero {
      text-align: center; padding: 1.5rem 1.5rem 1.25rem;
    }
    .hero-logo {
      width: 100px; height: 100px; object-fit: contain;
      margin: 0 auto 1.25rem; display: block;
    }
    .hero-tagline {
      font-size: 0.75rem; color: #aaa; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.3rem;
    }
    .hero-title {
      font-size: 1.8rem; font-weight: 800; color: var(--navy); letter-spacing: -0.5px;
    }
    .hero-title span { color: var(--cyan); }

    .menu-section { padding: 0.75rem 1.25rem 0.5rem; }
    .menu-label {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: #bbb; font-weight: 700; margin-bottom: 0.85rem;
    }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    .menu-card {
      background: #fff; border: 2px solid #eef6fd;
      border-radius: 20px; padding: 1.5rem 1rem 1.25rem;
      text-align: center; text-decoration: none;
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      box-shadow: 0 2px 12px rgba(0,174,239,0.06);
      transition: all 0.2s;
    }
    .menu-card:hover { border-color: var(--cyan); box-shadow: 0 8px 24px rgba(0,174,239,0.12); transform: translateY(-2px); }
    .menu-card:active { transform: scale(0.97); }
    .menu-card-img {
      width: 60px; height: 60px; border-radius: 16px;
      background: #f0f9ff; display: flex; align-items: center; justify-content: center;
      border: 1.5px solid #eef6fd;
    }
    .menu-card-img img { width: 44px; height: 44px; object-fit: contain; }
    .menu-card-name { font-size: 1rem; font-weight: 800; color: var(--navy); }
    .menu-card-desc { font-size: 0.72rem; color: #bbb; font-weight: 500; }

    .subscribe-wrap { padding: 1.1rem 1.25rem 0.5rem; }
    .subscribe-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 1.05rem; text-decoration: none; color: #fff; font-weight: 700;
      font-size: 0.98rem; border-radius: 16px;
      background: linear-gradient(135deg, var(--cyan), #0056A3);
      box-shadow: 0 6px 20px rgba(0,174,239,0.25); transition: all 0.2s;
    }
    .subscribe-btn:hover { opacity: 0.92; transform: translateY(-1px); }

    .footer-note {
      text-align: center; font-size: 0.75rem; color: #ccc;
      padding: 0.75rem 1.5rem 2rem; line-height: 1.7;
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <img src="images/neoflux.png" alt="NeoFlux" class="splash-logo"/>
    <p class="splash-powered">Powered by <strong>NeoFlux</strong></p>
  </div>

  <!-- LANDING -->
  <div id="landing">
    <div class="lang-bar">
      <select class="lang-select" id="lang-select" onchange="changeLang(this.value)">
        <option value="es">🇪🇸 Español</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="pt">🇧🇷 Português</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>

    <div class="hero">
      <img src="images/neoflux.png" alt="NeoFlux" class="hero-logo"/>
      <p class="hero-tagline" id="hero-tagline">Sistema de gestión hotelera</p>
      <h1 class="hero-title">Neo<span>Flux</span></h1>
    </div>

    <div class="menu-section">
      <p class="menu-label" id="menu-label">Acceder a</p>
      <div class="menu-grid">
        <a href="host/" class="menu-card">
          <div class="menu-card-img"><img src="images/host.png" alt="Host"/></div>
          <div class="menu-card-name">Host</div>
          <div class="menu-card-desc" id="desc-host">Panel propietario</div>
        </a>
        <a href="clean/" class="menu-card">
          <div class="menu-card-img"><img src="images/clean.png" alt="Clean"/></div>
          <div class="menu-card-name">Clean</div>
          <div class="menu-card-desc" id="desc-clean">Panel limpieza</div>
        </a>
        <a href="order/" class="menu-card">
          <div class="menu-card-img"><img src="images/order.png" alt="Order"/></div>
          <div class="menu-card-name">Order</div>
          <div class="menu-card-desc" id="desc-order">Panel pedidos</div>
        </a>
        <a href="guest/" class="menu-card">
          <div class="menu-card-img"><img src="images/guest.png" alt="Guest"/></div>
          <div class="menu-card-name">Guest</div>
          <div class="menu-card-desc" id="desc-guest">Check-In QR</div>
        </a>
      </div>
    </div>

    <div class="subscribe-wrap">
      <a href="subscribe/" class="subscribe-btn" id="btn-sub">
        💳 Suscribirse — 49€/mes
      </a>
    </div>
    <p class="footer-note" id="footer-note">
      14 días gratis · Sin tarjeta · Cancelás cuando querés
    </p>
  </div>

  <script type="module">
    const D = {
      es: { tagline:'Sistema de gestión hotelera', label:'Acceder a', host:'Panel propietario', clean:'Panel limpieza', order:'Panel pedidos', guest:'Check-In QR', sub:'💳 Suscribirse — 49€/mes', trial:'14 días gratis · Sin tarjeta · Cancelás cuando querés' },
      it: { tagline:'Sistema di gestione alberghiera', label:'Accedi a', host:'Pannello proprietario', clean:'Pannello pulizie', order:'Pannello ordini', guest:'Check-In QR', sub:'💳 Abbonati — 49€/mese', trial:'14 giorni gratis · Senza carta · Cancelli quando vuoi' },
      pt: { tagline:'Sistema de gestão hoteleira', label:'Acessar', host:'Painel proprietário', clean:'Painel limpeza', order:'Painel pedidos', guest:'Check-In QR', sub:'💳 Assinar — 49€/mês', trial:'14 dias grátis · Sem cartão · Cancele quando quiser' },
      fr: { tagline:'Système de gestion hôtelière', label:'Accéder à', host:'Panneau propriétaire', clean:'Panneau nettoyage', order:'Panneau commandes', guest:'Check-In QR', sub:"💳 S'abonner — 49€/mois", trial:'14 jours gratuits · Sans carte · Annulez quand vous voulez' },
      de: { tagline:'Hotelverwaltungssystem', label:'Zugriff auf', host:'Eigentümer-Panel', clean:'Reinigungs-Panel', order:'Bestell-Panel', guest:'Check-In QR', sub:'💳 Abonnieren — 49€/Monat', trial:'14 Tage kostenlos · Ohne Karte · Jederzeit kündbar' }
    };

    function applyLang(lang) {
      const d = D[lang] || D.es;
      document.getElementById('hero-tagline').textContent = d.tagline;
      document.getElementById('menu-label').textContent = d.label;
      document.getElementById('desc-host').textContent = d.host;
      document.getElementById('desc-clean').textContent = d.clean;
      document.getElementById('desc-order').textContent = d.order;
      document.getElementById('desc-guest').textContent = d.guest;
      document.getElementById('btn-sub').textContent = d.sub;
      document.getElementById('footer-note').textContent = d.trial;
      document.getElementById('lang-select').value = lang;
      localStorage.setItem('nf_lang', lang);
    }

    window.changeLang = (lang) => applyLang(lang);

    const saved = localStorage.getItem('nf_lang');
    const browser = navigator.language.slice(0,2).toLowerCase();
    const supported = ['es','it','pt','fr','de'];
    const lang = saved || (supported.includes(browser) ? browser : 'es');

    setTimeout(() => {
      document.getElementById('splash').classList.add('fade-out');
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('landing').style.display = 'block';
        applyLang(lang);
      }, 500);
    }, 2000);
  </script>
</body>
</html>
