<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoFlux — Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c87a;
      --navy: #1e2d3d; --font: 'DM Sans', sans-serif;
      --bg: #f5f7fa; --surface: #fff; --border: #f0e8d0;
      --muted: #8892a4; --success: #27ae60; --danger: #e74c3c;
      --warning: #f39c12; --radius: 20px;
    }
    body { background: var(--bg); font-family: var(--font); min-height: 100vh; }

    /* LOGIN */
    .login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; background: #fff;
    }
    .auth-box {
      background: #fff; border: 2px solid var(--border);
      border-radius: 28px; padding: 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(201,168,76,0.1);
    }
    .auth-logo-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: #fffbf0; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .auth-logo-wrap img { width: 56px; height: 56px; object-fit: contain; }
    .auth-title { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 0.25rem; }
    .auth-sub { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.75rem; }
    .input-wrap { position: relative; margin-bottom: 0.85rem; }
    .form-input {
      width: 100%; background: var(--bg); border: 2px solid var(--border);
      border-radius: 14px; padding: 1rem 3rem 1rem 1.1rem;
      color: var(--navy); font-family: var(--font); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--muted); }
    .eye-btn {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 1.1rem;
      color: var(--muted); padding: 0;
    }
    .btn-primary {
      width: 100%; padding: 1.05rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none; border-radius: 14px; color: #fff; font-weight: 700;
      font-family: var(--font); font-size: 1rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(201,168,76,0.3); transition: opacity 0.2s;
      margin-top: 0.25rem;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-msg { margin-top: 0.85rem; font-size: 0.82rem; text-align: center; color: var(--muted); min-height: 1rem; }
    .login-msg.error { color: var(--danger); }
    .back-link { display: block; text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 1.25rem; text-decoration: none; }
    .back-link:hover { color: var(--navy); }

    /* PANEL */
    .panel { display: none; min-height: 100vh; background: var(--bg); }
    .panel-header {
      background: var(--surface); border-bottom: 3px solid var(--gold-light);
      padding: 1.1rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 16px rgba(201,168,76,0.08);
    }
    .panel-header-left { display: flex; align-items: center; gap: 0.85rem; }
    .panel-logo { width: 44px; height: 44px; object-fit: contain; border-radius: 12px; }
    .panel-title { font-size: 1rem; font-weight: 700; color: var(--navy); }
    .panel-sub { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }
    .btn-logout {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 0.5rem 1rem; color: var(--muted);
      font-family: var(--font); font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* FILTER TABS */
    .filter-tabs {
      background: var(--surface); border-bottom: 1px solid #eee;
      display: flex; padding: 0 1rem; overflow-x: auto; scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab {
      flex: 1; min-width: 80px; padding: 0.9rem 0.5rem; border: none;
      background: transparent; color: var(--muted); font-family: var(--font);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap;
    }
    .filter-tab.active { color: var(--navy); border-bottom-color: var(--gold); }

    .content { padding: 1.5rem; max-width: 540px; margin: 0 auto; }
    .section-title {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin: 0 0 1rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .section-title::after { content:''; flex:1; height:1px; background: #eee; }

    .order-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: all 0.2s;
    }
    .order-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .order-room { font-weight: 700; font-size: 1rem; color: var(--navy); }
    .order-badge { font-size: 0.72rem; padding: 0.28rem 0.7rem; border-radius: 8px; font-weight: 700; }
    .badge-pending { background: #fdf2f2; color: #922b21; }
    .badge-progress { background: #fef9e7; color: #9a7d0a; }
    .badge-done { background: #eafaf1; color: #1e8449; }
    .order-items { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; }
    .order-note { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.4rem; }
    .order-total { font-size: 0.88rem; font-weight: 700; color: var(--navy); margin-bottom: 0.6rem; }
    .order-time { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.75rem; }
    .order-actions { display: flex; gap: 0.75rem; }
    .btn-action {
      flex: 1; padding: 0.75rem; border: none; border-radius: 12px;
      font-family: var(--font); font-size: 0.88rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-progress { background: #fef9e7; color: #9a7d0a; border: 1.5px solid #f0e8d0; }
    .btn-progress:hover { background: #fef3cc; }
    .btn-done { background: #eafaf1; color: #1e8449; border: 1.5px solid #d5f5d5; }
    .btn-done:hover { background: #d5f5d5; }

    .empty-state { text-align: center; color: var(--muted); padding: 3rem; font-size: 0.95rem; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login-page">
    <div class="auth-box">
      <div class="auth-logo-wrap">
        <img src="../images/order.png" alt="Order"/>
      </div>
      <div class="auth-title">Panel Order</div>
      <div class="auth-sub">Gestión de pedidos</div>
      <div class="input-wrap">
        <input type="email" class="form-input" id="order-email" placeholder="Email"/>
      </div>
      <div class="input-wrap">
        <input type="password" class="form-input" id="order-password" placeholder="Contraseña"/>
        <button class="eye-btn" type="button" onclick="toggleEye('order-password', this)">👁️</button>
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
      <p class="login-msg" id="login-msg"></p>
      <a href="../" class="back-link">← Volver al inicio</a>
    </div>
  </div>

  <!-- PANEL ORDER -->
  <div id="panel-screen" class="panel">
    <div class="panel-header">
      <div class="panel-header-left">
        <img src="../images/order.png" alt="Order" class="panel-logo"/>
        <div>
          <div class="panel-title">Panel Pedidos</div>
          <div class="panel-sub" id="panel-hotel-name">Cargando...</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">Todos</button>
      <button class="filter-tab" onclick="setFilter('pending', this)">Pendientes</button>
      <button class="filter-tab" onclick="setFilter('progress', this)">En curso</button>
      <button class="filter-tab" onclick="setFilter('done', this)">Completados</button>
    </div>

    <div class="content">
      <p class="section-title">Pedidos</p>
      <div id="orders-list">
        <p class="empty-state">Cargando...</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, collection, onSnapshot, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let hotelId = null;
    let currentFilter = 'all';
    let allOrders = [];

    const badgeClass = { pending:'badge-pending', progress:'badge-progress', done:'badge-done' };
    const badgeLabel = { pending:'Pendiente', progress:'En curso', done:'Completado' };

    window.toggleEye = (id, btn) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        hotelId = userDoc.exists() ? userDoc.data().hotelId : user.uid;
        const hotelDoc = await getDoc(doc(db, 'hotels', hotelId));
        if (hotelDoc.exists()) {
          document.getElementById('panel-hotel-name').textContent = hotelDoc.data().name;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('panel-screen').style.display = 'block';
        loadOrders();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('panel-screen').style.display = 'none';
      }
    });

    function loadOrders() {
      const q = query(collection(db, 'hotels', hotelId, 'orders'), orderBy('createdAt', 'desc'));
      onSnapshot(q, (snap) => {
        allOrders = [];
        snap.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
        renderOrders();
      });
    }

    function renderOrders() {
      const list = document.getElementById('orders-list');
      list.innerHTML = '';
      const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
      if (filtered.length === 0) {
        list.innerHTML = `<p class="empty-state">${currentFilter === 'done' ? '✅ Sin pedidos completados' : '✅ Sin pedidos ' + (currentFilter === 'all' ? '' : badgeLabel[currentFilter].toLowerCase() + 's')}</p>`;
        return;
      }
      filtered.forEach(o => {
        const card = document.createElement('div');
        card.className = 'order-card';
        const itemsText = o.items ? o.items.map(i => i.name).join(', ') : '';
        const time = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : '';
        card.innerHTML = `
          <div class="order-header">
            <span class="order-room">🚪 ${o.roomNumber || '—'}${o.guestName ? ' · '+o.guestName : ''}</span>
            <span class="order-badge ${badgeClass[o.status]}">${badgeLabel[o.status]}</span>
          </div>
          ${itemsText ? `<p class="order-items">📦 ${itemsText}</p>` : ''}
          ${o.note ? `<p class="order-note">📝 ${o.note}</p>` : ''}
          ${o.total > 0 ? `<p class="order-total">💰 $${o.total}</p>` : ''}
          <p class="order-time">🕐 ${time}</p>
          <div class="order-actions">
            ${o.status === 'pending' ? `<button class="btn-action btn-progress" onclick="updateOrder('${o.id}','progress')">▶ En curso</button>` : ''}
            ${o.status === 'progress' ? `<button class="btn-action btn-done" onclick="updateOrder('${o.id}','done')">✓ Completado</button>` : ''}
          </div>
        `;
        list.appendChild(card);
      });
    }

    window.setFilter = (filter, btn) => {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderOrders();
    };

    window.updateOrder = async (id, status) => {
      await updateDoc(doc(db, 'hotels', hotelId, 'orders', id), { status });
    };

    window.doLogin = async () => {
      const email = document.getElementById('order-email').value.trim();
      const password = document.getElementById('order-password').value;
      const msg = document.getElementById('login-msg');
      const btn = document.getElementById('btn-login');
      if (!email || !password) { msg.className='login-msg error'; msg.textContent='Completá email y contraseña'; return; }
      btn.disabled = true;
      msg.className = 'login-msg'; msg.textContent = 'Ingresando...';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch(e) {
        msg.className = 'login-msg error'; msg.textContent = 'Email o contraseña incorrectos';
        btn.disabled = false;
      }
    };

    window.doLogout = async () => { await signOut(auth); };
  </script>
</body>
</html>
